<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — PUREX Household</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            px: { blue: '#4d9ed5', black: '#0a0a0a', white: '#f5f5f0', accent: '#ff3d00' },
          },
          fontFamily: {
            mono: ['"JetBrains Mono"', 'monospace'],
            display: ['"Space Grotesk"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::selection { background: #4d9ed5; color: #0a0a0a; }
    body { background: #f5f5f0; color: #0a0a0a; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; cursor: crosshair; }
    a, button { cursor: crosshair; }
    .b-border { border: 2px solid #0a0a0a; }
    .b-border-b { border-bottom: 2px solid #0a0a0a; }
    .b-border-t { border-top: 2px solid #0a0a0a; }
    .b-border-r { border-right: 2px solid #0a0a0a; }
    .b-border-l { border-left: 2px solid #0a0a0a; }

    /* ── PRODUCT CARD: aggressive inversion on hover ── */
    .product-cell {
      border-right: 2px solid #0a0a0a;
      border-bottom: 2px solid #0a0a0a;
      transition: background 0.08s ease, color 0.08s ease;
      position: relative;
    }
    .product-cell:hover {
      background: #0a0a0a !important;
      color: #f5f5f0 !important;
    }
    .product-cell:hover .cell-label { color: rgba(245,245,240,0.3) !important; }
    .product-cell:hover .cell-price { color: #4d9ed5 !important; }
    .product-cell:hover .cell-cas { color: rgba(245,245,240,0.4) !important; }
    .product-cell:hover .cell-purity { background: #4d9ed5 !important; color: #0a0a0a !important; }
    .product-cell:hover .cell-icon path { fill: #f5f5f0; }
    .product-cell:hover .cell-icon .x-mark { fill: #4d9ed5; }
    .product-cell:hover .atc-brutal {
      background: #4d9ed5 !important;
      color: #0a0a0a !important;
      border-color: #4d9ed5 !important;
    }

    /* ── ADD TO CART BUTTON ── */
    .atc-brutal {
      background: #0a0a0a;
      color: #f5f5f0;
      border: 2px solid #0a0a0a;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 8px 16px;
      transition: transform 0.08s ease;
      position: relative;
      overflow: hidden;
    }
    .atc-brutal:active { transform: translate(2px, 2px); }

    /* ── FLYING ITEM (spring physics) ── */
    .fly-ghost {
      position: fixed;
      z-index: 200;
      pointer-events: none;
      background: #0a0a0a;
      color: #f5f5f0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 6px 12px;
      border: 2px solid #0a0a0a;
      white-space: nowrap;
    }

    /* ── CART COUNTER SNAP ── */
    .cart-count {
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .cart-count.snap { transform: scale(1.6); }

    /* ── FILTER TABS ── */
    .filter-tab {
      transition: all 0.08s ease;
    }
    .filter-tab.active {
      background: #0a0a0a;
      color: #f5f5f0;
    }
    .filter-tab:not(.active):hover {
      background: #0a0a0a;
      color: #f5f5f0;
    }

    /* ── VIEW TOGGLE ── */
    .view-btn.active { background: #0a0a0a; color: #f5f5f0; }

    /* ── TABLE VIEW ── */
    .table-row:hover { background: #0a0a0a; color: #f5f5f0; }
    .table-row:hover .t-cas { color: rgba(245,245,240,0.4); }
    .table-row:hover .t-price { color: #4d9ed5; }
    .table-row:hover .t-atc { background: #4d9ed5; color: #0a0a0a; border-color: #4d9ed5; }
  </style>
</head>
<body>

  <!-- ─── NAV ─── -->
  <nav class="b-border-b sticky top-0 z-50 bg-px-white">
    <div class="flex items-center justify-between px-6 py-3">
      <div class="flex items-center gap-3">
        <a href="../index.html" class="b-border px-3 py-1 text-[9px] tracking-[0.15em] uppercase font-medium hover:bg-px-black hover:text-px-white transition-all duration-75">&larr; All Concepts</a>
        <a href="index.html" class="flex items-center gap-3">
          <svg width="24" height="24" viewBox="0 0 100 100">
            <path d="M25 20 L25 80 L40 80 L40 55 L55 55 L70 35 L70 20 L55 20 L55 35 L40 35 L40 20 Z" fill="#0a0a0a"/>
            <path d="M55 45 L55 55 L45 55 L65 80 L80 80 L60 55 L70 55 L70 45 Z" fill="#4d9ed5"/>
          </svg>
          <span class="font-display text-sm font-bold tracking-wider">PUREX</span>
        </a>
      </div>
      <div class="hidden md:flex items-center gap-0">
        <a href="index.html" class="b-border-r b-border-l px-5 py-2 text-[10px] tracking-[0.2em] uppercase font-medium hover:bg-px-black hover:text-px-white transition-all duration-75">Home</a>
        <a href="shop.html" class="b-border-r px-5 py-2 text-[10px] tracking-[0.2em] uppercase font-bold bg-px-black text-px-white">Shop</a>
        <a href="admin.html" class="b-border-r px-5 py-2 text-[10px] tracking-[0.2em] uppercase font-medium hover:bg-px-black hover:text-px-white transition-all duration-75">Terminal</a>
      </div>
      <!-- Cart -->
      <button id="cart-toggle" class="flex items-center gap-2 b-border px-4 py-2 hover:bg-px-black hover:text-px-white transition-all duration-75 group">
        <span class="text-[10px] tracking-[0.2em] uppercase font-medium">Cart</span>
        <span id="cart-count" class="cart-count font-display font-bold text-sm text-px-blue">0</span>
      </button>
    </div>
  </nav>

  <!-- ─── SHOP HEADER ─── -->
  <div class="b-border-b">
    <div class="max-w-[1400px] mx-auto px-6 py-8 flex flex-col md:flex-row md:items-end md:justify-between gap-4">
      <div>
        <p class="text-[10px] tracking-[0.4em] text-px-blue uppercase mb-2 font-medium">Catalog / All Products</p>
        <h1 class="font-display text-4xl md:text-5xl font-bold">PRODUCT INDEX</h1>
      </div>
      <div class="flex items-center gap-3">
        <!-- View toggle -->
        <div class="flex b-border">
          <button class="view-btn active px-3 py-2" data-view="grid" onclick="setView('grid')">
            <svg width="14" height="14" fill="currentColor"><rect x="0" y="0" width="6" height="6"/><rect x="8" y="0" width="6" height="6"/><rect x="0" y="8" width="6" height="6"/><rect x="8" y="8" width="6" height="6"/></svg>
          </button>
          <button class="view-btn px-3 py-2 b-border-l" data-view="table" onclick="setView('table')">
            <svg width="14" height="14" fill="currentColor"><rect x="0" y="0" width="14" height="3"/><rect x="0" y="5.5" width="14" height="3"/><rect x="0" y="11" width="14" height="3"/></svg>
          </button>
        </div>
        <span class="text-[10px] text-px-black/30" id="product-count">20 items</span>
      </div>
    </div>
  </div>

  <!-- ─── FILTERS ─── -->
  <div class="b-border-b">
    <div class="max-w-[1400px] mx-auto px-6 py-3 flex flex-wrap gap-0">
      <button class="filter-tab active b-border px-4 py-2 text-[10px] tracking-[0.15em] uppercase" data-filter="all">All [20]</button>
      <button class="filter-tab b-border-t b-border-b b-border-r px-4 py-2 text-[10px] tracking-[0.15em] uppercase" data-filter="cleaning">Cleaning [8]</button>
      <button class="filter-tab b-border-t b-border-b b-border-r px-4 py-2 text-[10px] tracking-[0.15em] uppercase" data-filter="soap">Soap [9]</button>
      <button class="filter-tab b-border-t b-border-b b-border-r px-4 py-2 text-[10px] tracking-[0.15em] uppercase" data-filter="whitener">Whitener [3]</button>
    </div>
  </div>

  <!-- ─── PRODUCT GRID ─── -->
  <div id="grid-view" class="b-border-l">
    <div id="product-grid" class="max-w-[1400px] mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"></div>
  </div>

  <!-- ─── TABLE VIEW ─── -->
  <div id="table-view" class="hidden">
    <div class="max-w-[1400px] mx-auto">
      <table class="w-full">
        <thead>
          <tr class="b-border-b text-[9px] tracking-[0.2em] uppercase text-px-black/30">
            <th class="text-left p-4 font-medium">SKU</th>
            <th class="text-left p-4 font-medium">Product</th>
            <th class="text-left p-4 font-medium hidden md:table-cell">SKU</th>
            <th class="text-left p-4 font-medium">Purity</th>
            <th class="text-left p-4 font-medium">Volume</th>
            <th class="text-right p-4 font-medium">Price</th>
            <th class="p-4 font-medium"></th>
          </tr>
        </thead>
        <tbody id="product-table"></tbody>
      </table>
    </div>
  </div>

  <!-- ─── CART SIDEBAR ─── -->
  <div id="cart-overlay" class="fixed inset-0 bg-px-black/40 z-[60] opacity-0 pointer-events-none transition-opacity duration-200"></div>
  <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full max-w-md z-[70] transform translate-x-full transition-transform duration-300 ease-out">
    <div class="h-full bg-px-white b-border-l flex flex-col">
      <div class="flex items-center justify-between p-6 b-border-b">
        <h3 class="font-display text-lg font-bold">CART</h3>
        <button id="close-cart" class="b-border w-8 h-8 flex items-center justify-center hover:bg-px-black hover:text-px-white transition-all duration-75 text-sm font-bold">&times;</button>
      </div>
      <div id="cart-items" class="flex-1 overflow-y-auto">
        <p class="text-[10px] text-px-black/30 text-center py-16 tracking-wider uppercase">Empty</p>
      </div>
      <div class="b-border-t p-6">
        <div class="flex justify-between items-center mb-4">
          <span class="text-[10px] tracking-[0.2em] uppercase text-px-black/40">Total</span>
          <span id="cart-total" class="font-display text-2xl font-bold">Rs.0.00</span>
        </div>
        <button class="w-full bg-px-black text-px-white py-4 text-[10px] tracking-[0.2em] uppercase font-bold hover:bg-px-blue hover:text-px-black transition-all duration-75 active:translate-x-[2px] active:translate-y-[2px]">
          Process Checkout →
        </button>
      </div>
    </div>
  </div>

  <!-- ─── FOOTER ─── -->
  <footer class="b-border-t bg-px-black mt-16">
    <div class="max-w-[1400px] mx-auto px-6 py-6 flex items-center justify-between">
      <span class="text-[10px] tracking-[0.3em] text-px-white/30 uppercase">Purex Chemicals</span>
      <span class="text-[10px] text-px-white/15">&copy; 2026</span>
    </div>
  </footer>

  <script>
    // ─── DATA ───
    const products = [
      { id: 1, sku: 'PX-TZB-500', name: 'Taizab Cleaning Acid', category: 'cleaning', price: 120, purity: 'Extra Strong', cas: 'TZB-500', volume: '500ml' },
      { id: 2, sku: 'PX-TZB-1K', name: 'Taizab Cleaning Acid', category: 'cleaning', price: 200, purity: 'Extra Strong', cas: 'TZB-1000', volume: '1 Litre' },
      { id: 3, sku: 'PX-TZB-L5', name: 'Taizab Lemon Acid', category: 'cleaning', price: 140, purity: 'Lemon Fresh', cas: 'TZBL-500', volume: '500ml' },
      { id: 4, sku: 'PX-SWP-F5', name: 'Sweep Floor Cleaner', category: 'cleaning', price: 150, purity: 'Pine Fresh', cas: 'SWPF-500', volume: '500ml' },
      { id: 5, sku: 'PX-SWP-F1', name: 'Sweep Floor Cleaner', category: 'cleaning', price: 270, purity: 'Pine Fresh', cas: 'SWPF-1000', volume: '1 Litre' },
      { id: 6, sku: 'PX-SWP-T5', name: 'Sweep Toilet Cleaner', category: 'cleaning', price: 160, purity: 'Max Power', cas: 'SWPT-500', volume: '500ml' },
      { id: 7, sku: 'PX-BLC-500', name: 'Purex Bleach', category: 'cleaning', price: 90, purity: 'Active Chlorine', cas: 'BLC-500', volume: '500ml' },
      { id: 8, sku: 'PX-BLC-1K', name: 'Purex Bleach', category: 'cleaning', price: 160, purity: 'Active Chlorine', cas: 'BLC-1000', volume: '1 Litre' },
      { id: 9, sku: 'PX-CS-130', name: 'Purex Clothes Soap Bar', category: 'soap', price: 35, purity: 'Deep Clean', cas: 'CS-130', volume: '130g Bar' },
      { id: 10, sku: 'PX-CS-230', name: 'Purex Clothes Soap Bar', category: 'soap', price: 55, purity: 'Deep Clean', cas: 'CS-230', volume: '230g Bar' },
      { id: 11, sku: 'PX-CS-4PK', name: 'Purex Clothes Soap 4-Pack', category: 'soap', price: 200, purity: 'Family Pack', cas: 'CS-4PK', volume: '4 x 130g' },
      { id: 12, sku: 'PX-BS-R', name: 'Purex Bath Soap Rose', category: 'soap', price: 60, purity: 'Rose Fragrance', cas: 'BSR-100', volume: '100g Bar' },
      { id: 13, sku: 'PX-BS-N', name: 'Purex Bath Soap Neem', category: 'soap', price: 55, purity: 'Antibacterial', cas: 'BSN-100', volume: '100g Bar' },
      { id: 14, sku: 'PX-BS-3PK', name: 'Purex Bath Soap 3-Pack', category: 'soap', price: 160, purity: 'Value Pack', cas: 'BS-3PK', volume: '3 x 100g' },
      { id: 15, sku: 'PX-DS-200', name: 'Purex Dish Soap Bar', category: 'soap', price: 45, purity: 'Grease Cutter', cas: 'DS-200', volume: '200g Bar' },
      { id: 16, sku: 'PX-DS-L5', name: 'Purex Dish Soap Liquid', category: 'soap', price: 130, purity: 'Lemon Power', cas: 'DSL-500', volume: '500ml' },
      { id: 17, sku: 'PX-DS-L1', name: 'Purex Dish Soap Liquid', category: 'soap', price: 230, purity: 'Lemon Power', cas: 'DSL-1000', volume: '1 Litre' },
      { id: 18, sku: 'PX-NL-100', name: 'Purex Neel Liquid', category: 'whitener', price: 30, purity: 'Ultra Blue', cas: 'NL-100', volume: '100ml' },
      { id: 19, sku: 'PX-NL-250', name: 'Purex Neel Liquid', category: 'whitener', price: 65, purity: 'Ultra Blue', cas: 'NL-250', volume: '250ml' },
      { id: 20, sku: 'PX-NP-50', name: 'Purex Neel Powder', category: 'whitener', price: 20, purity: 'Classic Blue', cas: 'NP-50', volume: '50g Sachet' },
    ];

    let cart = [];
    let currentView = 'grid';
    let currentFilter = 'all';

    // ─── RENDER GRID ───
    function renderGrid(filter) {
      const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
      document.getElementById('product-count').textContent = filtered.length + ' items';

      document.getElementById('product-grid').innerHTML = filtered.map((p, i) => `
        <div class="product-cell p-6 min-h-[240px] flex flex-col justify-between" data-id="${p.id}">
          <div>
            <div class="flex items-start justify-between mb-4">
              <span class="cell-label text-[9px] tracking-[0.2em] uppercase text-px-black/20">${p.sku}</span>
              <span class="cell-purity text-[9px] px-2 py-0.5 bg-px-black/[0.04] font-medium tracking-wider">${p.purity}</span>
            </div>
            <div class="cell-icon mb-4">
              <svg width="36" height="44" viewBox="0 0 80 100">
                <path d="M30 0 L30 5 L50 5 L50 0 Z" fill="#0a0a0a" opacity="0.3"/>
                <path d="M28 5 L28 35 L10 70 Q5 82 15 90 L65 90 Q75 82 70 70 L52 35 L52 5" fill="none" stroke="#0a0a0a" stroke-width="2.5"/>
                <path class="x-mark" d="M30 55 L50 75 M50 55 L30 75" stroke="#4d9ed5" stroke-width="3" fill="none"/>
              </svg>
            </div>
            <h3 class="font-display text-sm font-bold mb-1">${p.name}</h3>
            <p class="cell-cas text-[9px] text-px-black/30 tracking-wider">SKU: ${p.cas}</p>
            <p class="cell-cas text-[9px] text-px-black/30 tracking-wider mt-0.5">${p.volume}</p>
          </div>
          <div class="flex items-center justify-between mt-4">
            <span class="cell-price font-display text-xl font-bold">Rs.${p.price.toFixed(2)}</span>
            <button class="atc-brutal" onclick="addToCart(${p.id}, event)">ADD +</button>
          </div>
        </div>
      `).join('');

      // Stagger in
      gsap.from('.product-cell', { opacity: 0, y: 20, duration: 0.3, stagger: 0.04, ease: 'power2.out' });
    }

    // ─── RENDER TABLE ───
    function renderTable(filter) {
      const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
      document.getElementById('product-count').textContent = filtered.length + ' items';

      document.getElementById('product-table').innerHTML = filtered.map(p => `
        <tr class="table-row b-border-b transition-all duration-75 cursor-crosshair" data-id="${p.id}">
          <td class="p-4 text-[10px] tracking-wider text-px-blue font-medium">${p.sku}</td>
          <td class="p-4 font-display text-sm font-bold">${p.name}</td>
          <td class="p-4 text-[10px] t-cas text-px-black/30 tracking-wider hidden md:table-cell">${p.cas}</td>
          <td class="p-4 text-[10px] font-medium">${p.purity}</td>
          <td class="p-4 text-[10px] text-px-black/50">${p.volume}</td>
          <td class="p-4 text-right font-display font-bold t-price">Rs.${p.price.toFixed(2)}</td>
          <td class="p-4 text-right">
            <button class="t-atc text-[9px] tracking-wider uppercase b-border px-3 py-1.5 font-medium hover:bg-px-black hover:text-px-white transition-all duration-75" onclick="addToCart(${p.id}, event)">ADD</button>
          </td>
        </tr>
      `).join('');

      gsap.from('#product-table tr', { opacity: 0, x: -10, duration: 0.2, stagger: 0.03, ease: 'power2.out' });
    }

    // ─── VIEW TOGGLE ───
    function setView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
      document.getElementById('grid-view').classList.toggle('hidden', view !== 'grid');
      document.getElementById('table-view').classList.toggle('hidden', view !== 'table');
      render();
    }

    function render() {
      if (currentView === 'grid') renderGrid(currentFilter);
      else renderTable(currentFilter);
    }

    // ─── FILTERS ───
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        render();
      });
    });

    // ─── ADD TO CART WITH SPRING PHYSICS ───
    function addToCart(id, event) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      const btn = event.currentTarget;
      const btnRect = btn.getBoundingClientRect();
      const cartBtn = document.getElementById('cart-toggle');
      const cartRect = cartBtn.getBoundingClientRect();

      // Create flying ghost element
      const ghost = document.createElement('div');
      ghost.className = 'fly-ghost';
      ghost.textContent = product.sku;
      document.body.appendChild(ghost);

      // Start at button position
      gsap.set(ghost, {
        left: btnRect.left,
        top: btnRect.top,
        width: btnRect.width,
      });

      // Spring physics: high tension (short duration), low friction (slight overshoot via elastic ease)
      const targetX = cartRect.left + cartRect.width / 2 - btnRect.width / 2;
      const targetY = cartRect.top;

      gsap.to(ghost, {
        left: targetX,
        top: targetY,
        scale: 0.4,
        opacity: 0.6,
        duration: 0.35,
        ease: 'power4.in',
        onComplete: () => {
          ghost.remove();

          // Cart badge snap (spring oscillation)
          const countEl = document.getElementById('cart-count');
          countEl.classList.add('snap');
          setTimeout(() => countEl.classList.remove('snap'), 200);

          // Secondary damping: rapid scale oscillation on the cart button
          gsap.fromTo(cartBtn,
            { scaleX: 1.08, scaleY: 0.92 },
            { scaleX: 1, scaleY: 1, duration: 0.5, ease: 'elastic.out(1.2, 0.3)' }
          );

          // Update cart
          const existing = cart.find(c => c.id === id);
          if (existing) existing.qty++;
          else cart.push({ ...product, qty: 1 });
          updateCartUI();
        }
      });

      // Vertical spring arc
      gsap.to(ghost, {
        y: -60,
        duration: 0.15,
        ease: 'power2.out',
        yoyo: true,
        repeat: 1,
      });

      // Button feedback: hard snap
      gsap.fromTo(btn,
        { scaleX: 0.9, scaleY: 1.1 },
        { scaleX: 1, scaleY: 1, duration: 0.3, ease: 'elastic.out(1.5, 0.4)' }
      );
    }

    // ─── CART UI ───
    function updateCartUI() {
      const countEl = document.getElementById('cart-count');
      const totalItems = cart.reduce((s, c) => s + c.qty, 0);
      countEl.textContent = totalItems;

      const itemsEl = document.getElementById('cart-items');
      const totalEl = document.getElementById('cart-total');
      const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
      totalEl.textContent = 'Rs.' + total.toFixed(2);

      if (cart.length === 0) {
        itemsEl.innerHTML = '<p class="text-[10px] text-px-black/30 text-center py-16 tracking-wider uppercase">Empty</p>';
        return;
      }

      itemsEl.innerHTML = cart.map(item => `
        <div class="b-border-b p-4 flex items-center gap-4">
          <div class="w-10 h-10 b-border flex items-center justify-center text-[9px] font-bold font-display">${item.sku.split('-')[1]}</div>
          <div class="flex-1 min-w-0">
            <p class="font-display text-xs font-bold truncate">${item.name}</p>
            <p class="text-[9px] text-px-black/30 tracking-wider">${item.volume} &times; ${item.qty}</p>
          </div>
          <div class="text-right">
            <p class="font-display text-sm font-bold">Rs.${(item.price * item.qty).toFixed(2)}</p>
            <button class="text-[9px] text-px-black/30 hover:text-px-accent tracking-wider uppercase mt-1" onclick="removeFromCart(${item.id})">DEL</button>
          </div>
        </div>
      `).join('');
    }

    function removeFromCart(id) {
      cart = cart.filter(c => c.id !== id);
      updateCartUI();
    }

    // ─── CART TOGGLE ───
    document.getElementById('cart-toggle').addEventListener('click', () => toggleCart(true));
    document.getElementById('close-cart').addEventListener('click', () => toggleCart(false));
    document.getElementById('cart-overlay').addEventListener('click', () => toggleCart(false));

    function toggleCart(open) {
      const sidebar = document.getElementById('cart-sidebar');
      const overlay = document.getElementById('cart-overlay');
      sidebar.style.transform = open ? 'translateX(0)' : 'translateX(100%)';
      overlay.style.opacity = open ? '1' : '0';
      overlay.style.pointerEvents = open ? 'auto' : 'none';
    }

    // ─── INIT ───
    render();
  </script>
</body>
</html>
