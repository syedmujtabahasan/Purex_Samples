; ==================== PUREX PHP UPLOAD SIZE LIMITS ====================
; This file enforces upload size limits at the PHP level.
; On Hostinger shared hosting, this overrides php.ini for this directory.
; Apache's LimitRequestBody is also set in .htaccess.

; Maximum size of an uploaded file (5MB)
upload_max_filesize = 5M

; Maximum size of POST data (6MB — slightly larger to allow for form fields + file)
post_max_size = 6M

; Maximum number of files per upload request
max_file_uploads = 5

; Maximum memory a script can consume (prevent decompression bombs)
memory_limit = 64M

; Maximum execution time for upload processing (seconds)
max_execution_time = 30

; Maximum input time for receiving uploaded data (seconds)
max_input_time = 60
