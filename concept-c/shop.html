<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — PUREX Household Essentials</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#4d9ed5',
            taizab: '#D97706',
            sweep: '#16A34A',
            neel: '#2563EB',
            soap: '#7C3AED',
            bleach: '#0891B2',
            charcoal: '#1E293B',
          },
          fontFamily: {
            sans: ['"Inter"', 'system-ui', 'sans-serif'],
            display: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/lenis@1/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::selection { background: #4d9ed5; color: white; }
    body { background: #F8FAFC; color: #1E293B; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }

    .nav-pill { transition: all 0.15s ease; }
    .nav-pill:hover { background: #F1F5F9; }

    /* ── PRODUCT CARD ── */
    .product-card {
      background: white;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
      overflow: hidden;
    }
    .product-card:hover {
      border-color: #CBD5E1;
      box-shadow: 0 8px 24px -4px rgba(0,0,0,0.08);
      transform: translateY(-4px);
    }

    /* ── CATEGORY COLORS ── */
    .cat-cleaning { --accent: #D97706; --bg: #FEF3C7; --text: #92400E; }
    .cat-soap { --accent: #7C3AED; --bg: #EDE9FE; --text: #5B21B6; }
    .cat-whitener { --accent: #2563EB; --bg: #DBEAFE; --text: #1E40AF; }

    .cat-badge { background: var(--bg); color: var(--text); }
    .cat-stripe { background: var(--accent); }

    /* ── ADD TO CART BUTTON ── */
    .atc-btn {
      position: relative;
      overflow: hidden;
      background: #1E293B;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex; align-items: center; gap: 6px;
    }
    .atc-btn:hover { background: #334155; }
    .atc-btn:active { transform: scale(0.96); }
    .atc-btn.morphing {
      width: 40px !important;
      height: 40px !important;
      padding: 0 !important;
      border-radius: 50% !important;
      min-width: unset !important;
      justify-content: center;
    }
    .atc-btn.morphing .btn-label { opacity: 0; position: absolute; }

    /* ── FLYING DOT ── */
    .fly-dot {
      position: fixed;
      width: 40px; height: 40px;
      background: #1E293B;
      border-radius: 50%;
      z-index: 200;
      pointer-events: none;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── CART BADGE ── */
    .cart-badge {
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .cart-badge.pop { transform: scale(1.5); }

    /* ── FILTER ── */
    .filter-pill { transition: all 0.15s ease; }
    .filter-pill.active { background: #1E293B; color: white; border-color: #1E293B; }
    .filter-pill:not(.active):hover { background: #F1F5F9; border-color: #CBD5E1; }
  </style>
</head>
<body>

  <!-- ─── NAV ─── -->
  <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="../index.html" class="text-[11px] text-slate-400 hover:text-slate-600 transition font-medium">&larr; All Concepts</a>
        <span class="text-slate-200">|</span>
        <a href="index.html" class="flex items-center gap-2.5">
          <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center">
            <svg width="18" height="18" viewBox="0 0 100 100"><path d="M25 20 L25 80 L40 80 L40 55 L55 55 L70 35 L70 20 L55 20 L55 35 L40 35 L40 20 Z" fill="white"/><path d="M55 45 L55 55 L45 55 L65 80 L80 80 L60 55 L70 55 L70 45 Z" fill="white" opacity="0.7"/></svg>
          </div>
          <span class="font-display font-bold text-charcoal text-lg tracking-tight">Purex</span>
        </a>
      </div>
      <div class="hidden md:flex items-center gap-1">
        <a href="index.html" class="nav-pill px-4 py-2 rounded-lg text-sm font-medium text-slate-500">Home</a>
        <a href="shop.html" class="nav-pill px-4 py-2 rounded-lg text-sm font-medium text-charcoal bg-slate-50">Shop</a>
        <a href="admin.html" class="nav-pill px-4 py-2 rounded-lg text-sm font-medium text-slate-500">Dashboard</a>
      </div>
      <!-- Cart -->
      <button id="cart-btn" class="relative flex items-center gap-2 bg-slate-50 border border-slate-200 px-4 py-2 rounded-xl hover:border-slate-300 transition group">
        <svg width="18" height="18" fill="none" stroke="#1E293B" stroke-width="1.5"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.3 2.3c-.6.6-.2 1.7.7 1.7H17M17 17a2 2 0 100 4 2 2 0 000-4zM9 21a2 2 0 100-4 2 2 0 000 4z"/></svg>
        <span class="text-sm font-semibold text-charcoal">Cart</span>
        <span id="cart-badge" class="cart-badge w-5 h-5 bg-brand text-white text-[10px] font-bold rounded-full flex items-center justify-center opacity-0 scale-0 transition-all">0</span>
      </button>
    </div>
  </nav>

  <!-- ─── HEADER ─── -->
  <section class="pt-24 pb-6 px-6 bg-white border-b border-slate-100">
    <div class="max-w-7xl mx-auto">
      <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-6">
        <div>
          <p class="text-xs font-semibold text-brand tracking-widest uppercase mb-2">Product Catalog</p>
          <h1 class="font-display text-3xl md:text-4xl font-extrabold text-charcoal">Household Essentials</h1>
          <p class="text-sm text-slate-400 mt-1">Taizab, Neel, Sweep, Soaps, and Bleach — everything a Pakistani home needs.</p>
        </div>
        <p class="text-xs text-slate-400 font-medium" id="count-label">20 products</p>
      </div>
      <!-- Filters -->
      <div class="flex flex-wrap gap-2 pb-2">
        <button class="filter-pill active border border-slate-200 px-4 py-2 rounded-xl text-xs font-semibold" data-filter="all">All Products</button>
        <button class="filter-pill border border-slate-200 px-4 py-2 rounded-xl text-xs font-semibold" data-filter="cleaning">
          <span class="inline-block w-2 h-2 rounded-full bg-taizab mr-1.5"></span>Cleaning
        </button>
        <button class="filter-pill border border-slate-200 px-4 py-2 rounded-xl text-xs font-semibold" data-filter="soap">
          <span class="inline-block w-2 h-2 rounded-full bg-soap mr-1.5"></span>Soap
        </button>
        <button class="filter-pill border border-slate-200 px-4 py-2 rounded-xl text-xs font-semibold" data-filter="whitener">
          <span class="inline-block w-2 h-2 rounded-full bg-neel mr-1.5"></span>Whitener
        </button>
      </div>
    </div>
  </section>

  <!-- ─── PRODUCT GRID ─── -->
  <section class="py-8 px-6">
    <div id="product-grid" class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>
  </section>

  <!-- ─── CART SIDEBAR ─── -->
  <div id="cart-overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[60] opacity-0 pointer-events-none transition-all duration-300"></div>
  <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full max-w-md z-[70] transform translate-x-full transition-transform duration-400" style="transition-timing-function: cubic-bezier(0.22, 1, 0.36, 1);">
    <div class="h-full bg-white border-l border-slate-200 flex flex-col shadow-2xl">
      <div class="flex items-center justify-between p-6 border-b border-slate-100">
        <h3 class="font-display text-lg font-bold text-charcoal">Your Cart</h3>
        <button id="close-cart" class="w-8 h-8 rounded-lg bg-slate-50 border border-slate-200 flex items-center justify-center hover:bg-slate-100 transition text-slate-400 text-sm font-bold">&times;</button>
      </div>
      <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-3">
        <div class="text-center py-16">
          <svg width="48" height="48" fill="none" stroke="#CBD5E1" stroke-width="1" class="mx-auto mb-3"><circle cx="24" cy="24" r="22"/><path d="M16 20h16M14 28h20"/></svg>
          <p class="text-sm text-slate-300 font-medium">Your cart is empty</p>
        </div>
      </div>
      <div class="p-6 border-t border-slate-100 bg-slate-50/50">
        <div class="flex justify-between items-center mb-4">
          <span class="text-sm text-slate-500">Total</span>
          <span id="cart-total" class="font-display text-xl font-extrabold text-charcoal">Rs. 0</span>
        </div>
        <button class="w-full bg-charcoal text-white py-3.5 rounded-xl text-sm font-semibold hover:bg-slate-700 transition-colors active:scale-[0.98]">
          Proceed to Checkout
        </button>
      </div>
    </div>
  </div>

  <!-- ─── FOOTER ─── -->
  <footer class="border-t border-slate-100 bg-white py-8 px-6 mt-8">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <span class="text-xs text-slate-300 font-medium">PUREX HOUSEHOLD</span>
      <span class="text-xs text-slate-300">&copy; 2026</span>
    </div>
  </footer>

  <script>
    // ─── LENIS ───
    const lenis = new Lenis({ duration: 1.1, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)) });
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);

    // ─── PRODUCTS ───
    const products = [
      { id: 1, name: 'Taizab Cleaning Acid', category: 'cleaning', price: 120, tag: 'Extra Strong', sku: 'TZB-500', volume: '500ml', accent: '#D97706', bgAccent: '#FEF3C7', line: 'Taizab' },
      { id: 2, name: 'Taizab Cleaning Acid', category: 'cleaning', price: 200, tag: 'Extra Strong', sku: 'TZB-1000', volume: '1 Litre', accent: '#D97706', bgAccent: '#FEF3C7', line: 'Taizab' },
      { id: 3, name: 'Taizab Lemon Acid', category: 'cleaning', price: 140, tag: 'Lemon Fresh', sku: 'TZB-L500', volume: '500ml', accent: '#D97706', bgAccent: '#FEF3C7', line: 'Taizab' },
      { id: 4, name: 'Sweep Floor Cleaner', category: 'cleaning', price: 150, tag: 'Pine Fresh', sku: 'SWP-F500', volume: '500ml', accent: '#16A34A', bgAccent: '#DCFCE7', line: 'Sweep' },
      { id: 5, name: 'Sweep Floor Cleaner', category: 'cleaning', price: 270, tag: 'Pine Fresh', sku: 'SWP-F1000', volume: '1 Litre', accent: '#16A34A', bgAccent: '#DCFCE7', line: 'Sweep' },
      { id: 6, name: 'Sweep Toilet Cleaner', category: 'cleaning', price: 160, tag: 'Max Power', sku: 'SWP-T500', volume: '500ml', accent: '#16A34A', bgAccent: '#DCFCE7', line: 'Sweep' },
      { id: 7, name: 'Purex Bleach', category: 'cleaning', price: 90, tag: 'Active Chlorine', sku: 'BLC-500', volume: '500ml', accent: '#0891B2', bgAccent: '#CFFAFE', line: 'Bleach' },
      { id: 8, name: 'Purex Bleach', category: 'cleaning', price: 160, tag: 'Active Chlorine', sku: 'BLC-1000', volume: '1 Litre', accent: '#0891B2', bgAccent: '#CFFAFE', line: 'Bleach' },
      { id: 9, name: 'Purex Clothes Soap', category: 'soap', price: 35, tag: 'Deep Clean', sku: 'CS-130', volume: '130g Bar', accent: '#7C3AED', bgAccent: '#EDE9FE', line: 'Clothes' },
      { id: 10, name: 'Purex Clothes Soap', category: 'soap', price: 55, tag: 'Deep Clean', sku: 'CS-230', volume: '230g Bar', accent: '#7C3AED', bgAccent: '#EDE9FE', line: 'Clothes' },
      { id: 11, name: 'Clothes Soap 4-Pack', category: 'soap', price: 200, tag: 'Family Pack', sku: 'CS-4PK', volume: '4 × 130g', accent: '#7C3AED', bgAccent: '#EDE9FE', line: 'Clothes' },
      { id: 12, name: 'Bath Soap Rose', category: 'soap', price: 60, tag: 'Rose Fragrance', sku: 'BS-R100', volume: '100g Bar', accent: '#DB2777', bgAccent: '#FCE7F3', line: 'Bath' },
      { id: 13, name: 'Bath Soap Neem', category: 'soap', price: 55, tag: 'Antibacterial', sku: 'BS-N100', volume: '100g Bar', accent: '#16A34A', bgAccent: '#DCFCE7', line: 'Bath' },
      { id: 14, name: 'Bath Soap 3-Pack', category: 'soap', price: 160, tag: 'Value Pack', sku: 'BS-3PK', volume: '3 × 100g', accent: '#DB2777', bgAccent: '#FCE7F3', line: 'Bath' },
      { id: 15, name: 'Dish Soap Bar', category: 'soap', price: 45, tag: 'Grease Cutter', sku: 'DS-200', volume: '200g Bar', accent: '#EA580C', bgAccent: '#FFF7ED', line: 'Dish' },
      { id: 16, name: 'Dish Soap Liquid', category: 'soap', price: 130, tag: 'Lemon Power', sku: 'DS-L500', volume: '500ml', accent: '#EA580C', bgAccent: '#FFF7ED', line: 'Dish' },
      { id: 17, name: 'Dish Soap Liquid', category: 'soap', price: 230, tag: 'Lemon Power', sku: 'DS-L1000', volume: '1 Litre', accent: '#EA580C', bgAccent: '#FFF7ED', line: 'Dish' },
      { id: 18, name: 'Purex Neel Liquid', category: 'whitener', price: 30, tag: 'Ultra Blue', sku: 'NL-100', volume: '100ml', accent: '#2563EB', bgAccent: '#DBEAFE', line: 'Neel' },
      { id: 19, name: 'Purex Neel Liquid', category: 'whitener', price: 65, tag: 'Ultra Blue', sku: 'NL-250', volume: '250ml', accent: '#2563EB', bgAccent: '#DBEAFE', line: 'Neel' },
      { id: 20, name: 'Purex Neel Powder', category: 'whitener', price: 20, tag: 'Classic Blue', sku: 'NP-50', volume: '50g Sachet', accent: '#2563EB', bgAccent: '#DBEAFE', line: 'Neel' },
    ];

    let cart = [];

    // ─── RENDER ───
    function renderProducts(filter = 'all') {
      const grid = document.getElementById('product-grid');
      const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
      document.getElementById('count-label').textContent = filtered.length + ' products';

      grid.innerHTML = filtered.map(p => `
        <div class="product-card cat-${p.category}">
          <div class="h-1 cat-stripe rounded-t-2xl"></div>
          <div class="p-5">
            <div class="flex items-start justify-between mb-3">
              <span class="cat-badge text-[10px] font-semibold px-2.5 py-1 rounded-lg">${p.line}</span>
              <span class="text-[10px] text-slate-300 font-medium">${p.sku}</span>
            </div>
            <div class="w-full h-28 rounded-xl mb-4 flex items-center justify-center" style="background: ${p.bgAccent}40;">
              <svg width="44" height="54" viewBox="0 0 80 100">
                <rect x="25" y="0" width="30" height="8" rx="3" fill="${p.accent}" opacity="0.25"/>
                <path d="M27 8 L27 35 L12 68 Q7 80 16 88 L64 88 Q73 80 68 68 L53 35 L53 8" fill="none" stroke="${p.accent}" stroke-width="2" opacity="0.5"/>
                <path d="M16 68 Q22 58 40 63 Q58 68 64 68 L64 88 Q73 80 68 68 L53 35 L53 42 Q40 38 27 42 L27 35 L12 68 Q7 80 16 88 Z" fill="${p.accent}" opacity="0.12"/>
              </svg>
            </div>
            <h3 class="font-display text-sm font-bold text-charcoal mb-0.5">${p.name}</h3>
            <div class="flex items-center gap-2 mb-3">
              <span class="text-[10px] text-slate-400">${p.volume}</span>
              <span class="text-[10px] text-slate-300">·</span>
              <span class="text-[10px] font-medium" style="color: ${p.accent}">${p.tag}</span>
            </div>
            <div class="flex items-center justify-between">
              <span class="font-display text-lg font-extrabold text-charcoal">Rs. ${p.price}</span>
              <button class="atc-btn" onclick="addToCart(${p.id}, this)">
                <span class="btn-label">Add</span>
                <svg class="btn-label" width="14" height="14" fill="none" stroke="white" stroke-width="2"><path d="M7 1v12M1 7h12"/></svg>
              </button>
            </div>
          </div>
        </div>
      `).join('');

      gsap.from('.product-card', { opacity: 0, y: 24, duration: 0.45, stagger: 0.05, ease: 'power3.out' });
    }

    // ─── ADD TO CART (Peak-End: Morph → Arc → Bounce) ───
    function addToCart(id, btn) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      const btnRect = btn.getBoundingClientRect();
      const cartEl = document.getElementById('cart-btn');
      const cartRect = cartEl.getBoundingClientRect();

      const origW = btn.offsetWidth;
      const origH = btn.offsetHeight;
      const origHTML = btn.innerHTML;

      // Phase 1: Morph button → circle
      btn.style.width = origW + 'px';
      btn.style.height = origH + 'px';
      btn.classList.add('morphing');

      // Physics params: mass=1, tension=170, friction=26
      // Translate to GSAP: duration ~0.35s, elastic ease with ~1.2 amplitude, ~0.35 period
      gsap.to(btn, {
        width: 40, height: 40,
        duration: 0.2, ease: 'power3.in',
        onComplete: () => {
          // Phase 2: Create flying dot
          const dot = document.createElement('div');
          dot.className = 'fly-dot';
          dot.innerHTML = '<svg width="16" height="16" fill="none" stroke="white" stroke-width="2"><path d="M8 2v12M2 8h12"/></svg>';
          document.body.appendChild(dot);

          const newRect = btn.getBoundingClientRect();
          gsap.set(dot, { left: newRect.left, top: newRect.top });
          btn.style.opacity = '0';

          const endX = cartRect.left + cartRect.width / 2 - 20;
          const endY = cartRect.top + cartRect.height / 2 - 20;

          // Horizontal: spring-like (tension 170)
          gsap.to(dot, {
            left: endX,
            scale: 0.4,
            opacity: 0.7,
            duration: 0.45,
            ease: 'power3.in',
          });

          // Vertical: arc with overshoot (friction 26 → slight bounce)
          gsap.to(dot, {
            keyframes: [
              { top: newRect.top - 60, duration: 0.2, ease: 'power2.out' },
              { top: endY, duration: 0.25, ease: 'power3.in' },
            ],
            onComplete: () => {
              dot.remove();

              // Phase 3: Secondary damping oscillation on cart badge
              const badge = document.getElementById('cart-badge');
              badge.classList.add('pop');
              setTimeout(() => badge.classList.remove('pop'), 250);

              // Settle bounce on the cart button (damped oscillation)
              gsap.fromTo(cartEl,
                { scaleX: 1.1, scaleY: 0.9 },
                { scaleX: 1, scaleY: 1, duration: 0.6, ease: 'elastic.out(1.2, 0.35)' }
              );

              // Update state
              const existing = cart.find(c => c.id === id);
              if (existing) existing.qty++;
              else cart.push({ ...product, qty: 1 });
              updateCartUI();

              // Restore button
              btn.classList.remove('morphing');
              btn.style.width = '';
              btn.style.height = '';
              btn.style.opacity = '1';
              btn.innerHTML = origHTML;

              // Success highlight
              gsap.fromTo(btn,
                { boxShadow: '0 0 0 3px rgba(77,158,213,0.4)' },
                { boxShadow: '0 0 0 0px rgba(77,158,213,0)', duration: 0.8, ease: 'power2.out' }
              );
            }
          });
        }
      });
    }

    // ─── CART UI ───
    function updateCartUI() {
      const badge = document.getElementById('cart-badge');
      const total = cart.reduce((s, c) => s + c.qty, 0);
      badge.textContent = total;
      badge.style.opacity = total > 0 ? '1' : '0';
      badge.style.transform = total > 0 ? 'scale(1)' : 'scale(0)';

      const itemsEl = document.getElementById('cart-items');
      const totalEl = document.getElementById('cart-total');
      const sum = cart.reduce((s, c) => s + c.price * c.qty, 0);
      totalEl.textContent = 'Rs. ' + sum.toLocaleString();

      if (cart.length === 0) {
        itemsEl.innerHTML = '<div class="text-center py-16"><svg width="48" height="48" fill="none" stroke="#CBD5E1" stroke-width="1" class="mx-auto mb-3"><circle cx="24" cy="24" r="22"/><path d="M16 20h16M14 28h20"/></svg><p class="text-sm text-slate-300 font-medium">Your cart is empty</p></div>';
        return;
      }

      itemsEl.innerHTML = cart.map(item => `
        <div class="flex items-center gap-3 bg-slate-50 rounded-xl p-3 border border-slate-100">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" style="background: ${item.bgAccent}">
            <span class="text-xs font-bold" style="color: ${item.accent}">${item.line[0]}${item.line[1]}</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-xs font-semibold text-charcoal truncate">${item.name}</p>
            <p class="text-[10px] text-slate-400">${item.volume} × ${item.qty}</p>
          </div>
          <div class="text-right flex-shrink-0">
            <p class="text-xs font-bold text-charcoal">Rs. ${(item.price * item.qty).toLocaleString()}</p>
            <button class="text-[10px] text-slate-400 hover:text-red-500 transition font-medium mt-0.5" onclick="removeItem(${item.id})">Remove</button>
          </div>
        </div>
      `).join('');
    }

    function removeItem(id) { cart = cart.filter(c => c.id !== id); updateCartUI(); }

    // ─── CART TOGGLE ───
    document.getElementById('cart-btn').addEventListener('click', () => toggleCart(true));
    document.getElementById('close-cart').addEventListener('click', () => toggleCart(false));
    document.getElementById('cart-overlay').addEventListener('click', () => toggleCart(false));

    function toggleCart(open) {
      document.getElementById('cart-sidebar').style.transform = open ? 'translateX(0)' : 'translateX(100%)';
      const ov = document.getElementById('cart-overlay');
      ov.style.opacity = open ? '1' : '0';
      ov.style.pointerEvents = open ? 'auto' : 'none';
    }

    // ─── FILTERS ───
    document.querySelectorAll('.filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProducts(btn.dataset.filter);
      });
    });

    // ─── INIT ───
    renderProducts();
  </script>
</body>
</html>
