    { id: 21, name: 'Purex Laundry Soap Bundle', category: 'Soap', price: 280, buyPrice: 130, stock: 60, status: 'active', sku: 'SOP-BDL5', volume: '5x130g', desc: 'Bulk laundry soap bundle — five bars for maximum savings. Long-lasting formula removes tough stains from collars, cuffs and everyday dirt.', image: '../../assets/products/product_21.png' },
    { id: 22, name: 'Purex Bath Soap Honey', category: 'Soap', price: 65, buyPrice: 30, stock: 180, status: 'active', sku: 'SOP-HNY100', volume: '100g', desc: 'Luxurious honey-infused bath soap. Nourishes and hydrates dry skin with natural honey extracts. Smooth, creamy texture with a warm fragrance.', image: '../../assets/products/product_22.webp' },
    { id: 23, name: 'Purex Spin Mop', category: 'Cleaning', price: 850, buyPrice: 400, stock: 20, status: 'active', sku: 'MOP-SPIN', volume: 'Standard', desc: 'Professional spin mop with 360-degree rotating head. Microfiber strands pick up dust, dirt and spills effortlessly. Stainless steel handle for durability.', image: '../../assets/products/product_23.png' },
    { id: 24, name: 'Purex Cotton Mop', category: 'Cleaning', price: 450, buyPrice: 210, stock: 35, status: 'active', sku: 'MOP-CTN', volume: 'Standard', desc: 'Classic cotton string mop with sturdy aluminum handle. Highly absorbent cotton threads for efficient floor cleaning. Easy to wring and maintain.', image: '../../assets/products/product_24.png' },
    { id: 25, name: 'Purex Heavy Duty Mop', category: 'Cleaning', price: 550, buyPrice: 260, stock: 25, status: 'active', sku: 'MOP-HD', volume: 'Large', desc: 'Extra-thick cotton mop head for heavy-duty floor cleaning. Ideal for large areas, commercial spaces and deep cleaning sessions. Replaceable head.', image: '../../assets/products/product_25.jpg' },
    { id: 26, name: 'Purex Mop Head Refill', category: 'Cleaning', price: 250, buyPrice: 115, stock: 50, status: 'active', sku: 'MOP-REF', volume: 'Standard', desc: 'Replacement mop head made from premium cotton string. Universal fit for most mop handles. Economical and eco-friendly alternative to buying a full mop.', image: '../../assets/products/product_26.jpg' },
    { id: 27, name: 'Purex Cleaning Kit', category: 'Cleaning', price: 1200, buyPrice: 560, stock: 15, status: 'active', sku: 'KIT-FULL', volume: 'Complete Set', desc: 'All-in-one cleaning kit with assorted bottles, sponges, cloths and brushes. Everything you need for a spotless home. Great gift for new homeowners.', image: '../../assets/products/product_27.jpg' },
    { id: 28, name: 'Purex Power Spray', category: 'Cleaning', price: 220, buyPrice: 105, stock: 45, status: 'active', sku: 'PWR-500', volume: '500ml', desc: 'High-pressure action cleaning spray that blasts away grease, grime and stubborn stains. Works on kitchen surfaces, stovetops, tiles and bathroom fixtures.', image: '../../assets/products/product_28.jpg' },
    { id: 29, name: 'Purex Cleaning Bundle', category: 'Cleaning', price: 950, buyPrice: 440, stock: 18, status: 'active', sku: 'KIT-BSKT', volume: 'Basket Set', desc: 'Portable cleaning basket with essential supplies. Includes spray bottles, scrub brush, sponge and microfiber cloth. Organized and ready to use.', image: '../../assets/products/product_29.png' },
    { id: 30, name: 'Purex Liquid Detergent', category: 'Cleaning', price: 320, buyPrice: 150, stock: 55, status: 'active', sku: 'DET-1000', volume: '1 Litre', desc: 'Concentrated liquid laundry detergent. Removes tough stains at low temperatures. Fresh ocean breeze scent keeps clothes smelling great all day.', image: '../../assets/products/product_30.jpg' },
    { id: 31, name: 'Purex Liquid Detergent XL', category: 'Cleaning', price: 550, buyPrice: 255, stock: 30, status: 'active', sku: 'DET-2000', volume: '2 Litre', desc: 'Extra-large liquid detergent for families. Double the cleaning power in an economy bottle. Colour-safe formula protects bright and dark fabrics.', image: '../../assets/products/product_31.jpg' },
  ];

  let products = DEFAULT_PRODUCTS.filter(p => p.status === 'active');

  (async function() {
    try {
      const res = await fetch('/api/products');
      if (res.ok) {
        const data = await res.json();
        if (Array.isArray(data) && data.length > 0) {
          products = data.map(p => ({
            id: p.id, name: p.name, category: p.category,
            price: Number(p.price), buyPrice: Number(p.buy_price),
            stock: Number(p.stock), status: p.status, sku: p.sku, volume: p.volume,
            desc: p.description, image: p.image || '/assets/products/product_' + p.id + '.png',
            onSale: p.on_sale == 1, salePrice: Number(p.sale_price || 0),
          })).filter(p => p.status === 'active');
          initProduct();
        }
      }
    } catch(e) {}
  })();

  // ─── HELPERS ───
  const categoryIcons = {
    Cleaning: '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke="rgba(77,158,213,0.3)"/><path d="M8 12l2 2 4-4" stroke="#4d9ed5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    Whitener: '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="rgba(168,130,255,0.3)"/><path d="M12 6v6l4 2" stroke="#c4a8ff" stroke-width="2" stroke-linecap="round"/></svg>',
    Soap: '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="rgba(72,199,142,0.3)"/><path d="M8 14s1.5 2 4 2 4-2 4-2" stroke="#72c78e" stroke-width="2" stroke-linecap="round"/><circle cx="9" cy="10" r="1" fill="#72c78e"/><circle cx="15" cy="10" r="1" fill="#72c78e"/></svg>',
    Bleach: '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="rgba(255,180,80,0.3)"/><path d="M12 8v4M12 16h.01" stroke="#ffb450" stroke-width="2" stroke-linecap="round"/></svg>',
  };

  const categoryColors = {
    Cleaning: { bg: 'rgba(77,158,213,0.12)', text: '#7bb8e0', border: 'rgba(77,158,213,0.2)', accent: '#4d9ed5' },
    Whitener: { bg: 'rgba(168,130,255,0.12)', text: '#c4a8ff', border: 'rgba(168,130,255,0.2)', accent: '#a882ff' },
    Soap: { bg: 'rgba(72,199,142,0.12)', text: '#72c78e', border: 'rgba(72,199,142,0.2)', accent: '#48c78e' },
    Bleach: { bg: 'rgba(255,180,80,0.12)', text: '#ffb450', border: 'rgba(255,180,80,0.2)', accent: '#ffb450' },
  };

  function getBadgeClass(cat) {
    return 'badge-' + cat.toLowerCase();
  }

  function getStockInfo(stock) {
    if (stock >= 100) return { class: 'stock-high', label: 'In Stock', color: '#4ade80' };
    if (stock >= 50) return { class: 'stock-medium', label: 'Limited Stock', color: '#fbbf24' };
    return { class: 'stock-low', label: 'Low Stock', color: '#f87171' };
  }

  function getWhatsAppURL(product) {
    const msg = `Hi, I'm interested in ${product.name} (SKU: ${product.sku}). Please share details.`;
    return `https://wa.me/923400145796?text=${encodeURIComponent(msg)}`;
  }

  function getSizeFromName(name) {
    const match = name.match(/(\d+(?:ml|L|g))/i);
    return match ? match[1] : '';
  }

  function getProductInitial(product) {
    // Get a meaningful short label
    if (product.name.startsWith('Taizab')) return 'TZ';
    if (product.name.startsWith('Sweep Floor')) return 'SF';
    if (product.name.startsWith('Sweep Toilet')) return 'ST';
    if (product.name.startsWith('Neel')) return 'NL';
    if (product.name.startsWith('Clothes Soap')) return 'CS';
    if (product.name.startsWith('Bath Soap')) return 'BS';
    if (product.name.startsWith('Dish Soap Bar')) return 'DS';
    if (product.name.startsWith('Dish Soap Liquid')) return 'DL';
    if (product.name.startsWith('Bleach')) return 'BL';
    return product.name.charAt(0);
  }

  // ─── URL PARSING ───
  const params = new URLSearchParams(window.location.search);
  const paramId = params.get('id');
  const paramSku = params.get('sku');

  let activeProduct = null;
  if (paramId) {
    activeProduct = products.find(p => p.id === parseInt(paramId));
  } else if (paramSku) {
    activeProduct = products.find(p => p.sku.toLowerCase() === paramSku.toLowerCase());
  }

  // ─── RENDER ───
  const app = document.getElementById('app');

  if (activeProduct) {
    renderProductDetail(activeProduct);
    document.getElementById('page-title').textContent = `${activeProduct.name} — PUREX Chemicals`;
    // Update floating WhatsApp link
    document.getElementById('wa-float').href = getWhatsAppURL(activeProduct);
  } else {
    renderProductGrid();
  }

  // ─── PRODUCT DETAIL VIEW ───
  function renderProductDetail(p) {
    const stockInfo = getStockInfo(p.stock);
    const colors = categoryColors[p.category];
    const size = p.volume || getSizeFromName(p.name);
    const initial = getProductInitial(p);

    // Find related products (same category, different id)
    const related = products.filter(r => r.category === p.category && r.id !== p.id).slice(0, 4);

    app.innerHTML = `
      <div class="max-w-6xl mx-auto">
        <!-- Breadcrumb -->
        <div class="flex items-center gap-2 text-xs text-white/30 mb-8 font-light tracking-wider" id="breadcrumb">
          <a href="../shop.html" class="hover:text-white/60 transition">Shop</a>
          <span>/</span>
          <span class="text-white/50">${p.category}</span>
          <span>/</span>
          <span class="text-white/70">${p.name}</span>
        </div>

        <!-- Main product section -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-16">

          <!-- LEFT: Product Image -->
          <div id="product-image-section">
            <div class="product-image-placeholder rounded-3xl aspect-square flex flex-col items-center justify-center relative" style="max-height: 520px;">
              <img src="${p.image || '../../assets/products/product_' + p.id + '.png'}" alt="${p.name}"
                   class="relative z-10 max-h-80 w-auto object-contain"
                   onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
              <div class="hidden relative z-10 flex-col items-center gap-4">
                <div class="w-28 h-28 rounded-full flex items-center justify-center" style="background: ${colors.bg}; border: 2px solid ${colors.border};">
                  <span class="font-heading text-4xl font-bold" style="color: ${colors.text};">${initial}</span>
                </div>
                <span class="text-sm font-light tracking-widest text-white/30 uppercase">${size}</span>
              </div>
              <div class="absolute bottom-6 left-6 right-6 glass rounded-xl px-4 py-3 flex items-center gap-3">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-white/30 flex-shrink-0">
                  <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
                  <rect x="14" y="14" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/><rect x="14" y="18" width="3" height="3" fill="none"/>
                </svg>
                <span class="text-[11px] text-white/30 tracking-wider">Scan QR on packaging to visit this page</span>
              </div>
            </div>
          </div>

          <!-- RIGHT: Product Info -->
          <div id="product-info-section" class="flex flex-col justify-center">
            <!-- Category badge -->
            <div class="mb-4">
              <span class="${getBadgeClass(p.category)} text-xs font-medium tracking-widest uppercase px-4 py-1.5 rounded-full inline-block">${p.category}</span>
            </div>

            <!-- Product name -->
            <h1 class="font-heading text-3xl md:text-4xl lg:text-5xl font-light text-white leading-tight mb-2">${p.name}</h1>

            <!-- SKU -->
            <p class="text-white/25 text-sm font-light tracking-[0.2em] mb-6">SKU: ${p.sku}</p>

            <!-- Price -->
            <div class="flex items-baseline gap-2 mb-6">
              <span class="text-4xl font-heading font-semibold text-gradient">Rs. ${p.price}</span>
              ${size ? `<span class="text-white/30 text-sm font-light">/ ${size}</span>` : ''}
            </div>

            <!-- Description -->
            <div class="glass-card rounded-2xl p-6 mb-6">
              <p class="text-white/60 font-light leading-relaxed text-[15px]">${p.desc}</p>
            </div>

            <!-- Size / Variant -->
            ${size ? `
            <div class="mb-6">
              <p class="text-white/30 text-xs tracking-widest uppercase mb-3">Size / Variant</p>
              <div class="flex gap-2 flex-wrap">
                ${products.filter(r => {
                  // Find same product line, different sizes
                  const baseName = p.name.replace(/\s*\d+(?:ml|L|g)/i, '').trim();
                  const rBaseName = r.name.replace(/\s*\d+(?:ml|L|g)/i, '').trim();
                  return baseName === rBaseName;
                }).map(v => {
                  const vSize = getSizeFromName(v.name);
                  const isActive = v.id === p.id;
                  return `<a href="?id=${v.id}" class="px-4 py-2 rounded-xl text-sm tracking-wider transition-all ${isActive ? 'glass-strong text-purex-blue border border-purex-blue/30' : 'glass text-white/40 hover:text-white/70 hover:border-white/15'}">${vSize}</a>`;
                }).join('')}
              </div>
            </div>` : ''}

            <!-- Stock Status -->
            <div class="flex items-center gap-3 mb-8">
              <span class="stock-dot ${stockInfo.class}"></span>
              <span class="text-sm font-light" style="color: ${stockInfo.color};">${stockInfo.label}</span>
              <span class="text-white/15 text-xs">(${p.stock} units available)</span>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4">
              <a href="${getWhatsAppURL(p)}" target="_blank"
                 class="pulse-green flex items-center justify-center gap-3 bg-[#25d366] hover:bg-[#20bd5a] text-white font-medium tracking-wider text-sm px-8 py-4 rounded-2xl transition-all duration-300 hover:scale-[1.02]">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                Order on WhatsApp
              </a>
              <a href="../shop.html"
                 class="glass flex items-center justify-center gap-2 text-white/60 hover:text-white font-light tracking-wider text-sm px-8 py-4 rounded-2xl transition-all duration-300 hover:border-white/15">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 2L4 8l6 6"/></svg>
                Back to Shop
              </a>
            </div>
          </div>
        </div>

        <!-- Related Products -->
        ${related.length > 0 ? `
        <div class="mt-24" id="related-section">
          <p class="font-heading text-sm tracking-[0.4em] text-purex-blue/60 uppercase mb-2">More in ${p.category}</p>
          <h2 class="font-heading text-2xl font-light text-white mb-8">Related Products</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
            ${related.map(r => renderGridCard(r)).join('')}
          </div>
        </div>` : ''}
      </div>
    `;

    // Animate in
    requestAnimationFrame(() => {
      gsap.fromTo('#breadcrumb', { opacity: 0, y: -10 }, { opacity: 1, y: 0, duration: 0.5, delay: 0.1 });
      gsap.fromTo('#product-image-section', { opacity: 0, x: -40 }, { opacity: 1, x: 0, duration: 0.8, delay: 0.2, ease: 'power3.out' });
      gsap.fromTo('#product-info-section', { opacity: 0, x: 40 }, { opacity: 1, x: 0, duration: 0.8, delay: 0.3, ease: 'power3.out' });
      if (document.getElementById('related-section')) {
        gsap.fromTo('#related-section', { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.7, delay: 0.6, ease: 'power3.out' });
      }
    });
  }

  // ─── SINGLE GRID CARD (reused in grid view & related) ───
  function renderGridCard(p) {
    const stockInfo = getStockInfo(p.stock);
    const colors = categoryColors[p.category];
    const initial = getProductInitial(p);
    const size = p.volume || getSizeFromName(p.name);

    return `
      <a href="?id=${p.id}" class="product-grid-card glass-card rounded-2xl overflow-hidden block group">
        <!-- Image area -->
        <div class="product-image-placeholder aspect-[4/3] flex items-center justify-center relative">
          <img src="${p.image || '../../assets/products/product_' + p.id + '.png'}" alt="${p.name}"
               class="h-32 w-32 object-contain transition-transform duration-300 group-hover:scale-110"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="hidden w-16 h-16 rounded-full flex items-center justify-center" style="background: ${colors.bg}; border: 1px solid ${colors.border};">
            <span class="font-heading text-xl font-bold" style="color: ${colors.text};">${initial}</span>
          </div>
          ${size ? `<span class="absolute bottom-3 right-3 text-[10px] text-white/25 tracking-widest">${size}</span>` : ''}
          <span class="absolute top-3 left-3 ${getBadgeClass(p.category)} text-[10px] tracking-widest uppercase px-3 py-1 rounded-full">${p.category}</span>
        </div>
        <!-- Info -->
        <div class="p-5">
          <h3 class="font-heading text-sm font-medium text-white group-hover:text-purex-blue transition-colors leading-snug mb-1">${p.name}</h3>
          <p class="text-white/25 text-[10px] tracking-widest mb-3">SKU: ${p.sku}</p>
          <div class="flex items-center justify-between">
            <span class="text-lg font-heading font-semibold text-gradient">Rs. ${p.price}</span>
            <div class="flex items-center gap-1.5">
              <span class="stock-dot ${stockInfo.class}" style="width:6px;height:6px;"></span>
              <span class="text-[10px]" style="color: ${stockInfo.color};">${stockInfo.label}</span>
            </div>
          </div>
        </div>
      </a>
    `;
  }

  // ─── PRODUCT GRID VIEW (all products) ───
  function renderProductGrid() {
    document.getElementById('page-title').textContent = 'All Products — PUREX Chemicals';

    app.innerHTML = `
      <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="mb-10" id="grid-header">
          <p class="font-heading text-sm tracking-[0.4em] text-purex-blue/80 uppercase mb-3">Product Catalog</p>
          <h1 class="font-heading text-4xl md:text-5xl font-extralight text-white">All <span class="text-gradient">Products</span></h1>
          <p class="text-white/40 font-light mt-3 max-w-lg">Browse our complete range of household and cleaning essentials. Tap any product for full details.</p>

          <!-- Filters (dynamic from product categories) -->
          <div class="flex flex-wrap gap-3 mt-8" id="filter-bar">
            <button class="filter-btn glass text-sm px-5 py-2 rounded-full text-white/60 tracking-wider active" data-filter="all">All (${products.length})</button>
            ${[...new Set(products.map(p => p.category).filter(Boolean))].sort().map(c => `<button class="filter-btn glass text-sm px-5 py-2 rounded-full text-white/60 tracking-wider" data-filter="${c}">${c}</button>`).join('')}
          </div>
        </div>

        <!-- Grid -->
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
          ${products.map(p => renderGridCard(p)).join('')}
        </div>
      </div>
    `;

    // Filter functionality
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
        const grid = document.getElementById('product-grid');

        // Animate out
        gsap.to(grid.children, {
          opacity: 0, y: 20, stagger: 0.02, duration: 0.2,
          onComplete: () => {
            grid.innerHTML = filtered.map(p => renderGridCard(p)).join('');
            gsap.fromTo(grid.children, { opacity: 0, y: 20 }, { opacity: 1, y: 0, stagger: 0.04, duration: 0.4, ease: 'power3.out' });
          }
        });
      });
    });

    // Animate grid in
    requestAnimationFrame(() => {
      gsap.fromTo('#grid-header', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.6, ease: 'power3.out' });
      gsap.fromTo('.product-grid-card', { opacity: 0, y: 30 }, { opacity: 1, y: 0, stagger: 0.05, duration: 0.5, delay: 0.2, ease: 'power3.out' });
    });
  }

  // WhatsApp pulse animation
  gsap.to('#wa-ping', { scale: 1.5, opacity: 0, duration: 1.5, repeat: -1, ease: 'power2.out' });
  </script>
</body>
</html>
