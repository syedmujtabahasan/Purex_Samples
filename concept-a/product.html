          products = data.map(p => ({
            id: p.id, name: p.name, category: p.category,
            price: Number(p.price), buyPrice: Number(p.buy_price),
            stock: Number(p.stock), status: p.status, sku: p.sku, volume: p.volume,

          initProduct();

  function getSize(name, volume) { if (volume) return volume; const m = name.match(/(\d+(?:ml|L|g))/i); return m ? m[1] : ''; }
  function getInitial(p) {
    if (p.name.startsWith('Taizab')) return 'TZ';
    if (p.name.startsWith('Sweep Floor')) return 'SF';
    if (p.name.startsWith('Sweep Toilet')) return 'ST';
    if (p.name.startsWith('Neel')) return 'NL';
    if (p.name.startsWith('Clothes Soap')) return 'CS';
    if (p.name.startsWith('Bath Soap')) return 'BS';
    if (p.name.startsWith('Dish Soap Bar')) return 'DB';
    if (p.name.startsWith('Dish Soap Liquid')) return 'DL';
    if (p.name.startsWith('Bleach')) return 'BL';
    return p.name.slice(0, 2).toUpperCase();
  }
  function getLineName(name) { return name.replace(/\s*\d+(?:ml|L|g)/i, '').trim(); }
  function stockInfo(s) {
    if (s >= 100) return { cls: 'stock-high', label: 'In Stock', color: '#4ade80' };
    if (s >= 50)  return { cls: 'stock-med',  label: 'Available', color: '#fbbf24' };
    return { cls: 'stock-low', label: 'Low Stock', color: '#f87171' };
  }
  function waURL(p) {
    return `https://wa.me/923400145796?text=${encodeURIComponent(`Hi, I'd like to order ${p.name} (${p.sku}) — Rs. ${p.price}. Please confirm availability.`)}`;
  }

            <div class="hidden flex-col items-center justify-center">
              <span class="font-heading text-5xl md:text-6xl font-bold" style="color: ${accent.primary}; opacity: 0.8;">${initials}</span>
              <span class="text-[11px] tracking-[0.25em] text-white/30 mt-1 uppercase">${size}</span>
            </div>
          </div>

          <!-- QR Badge -->
          <div id="qr-badge" class="absolute bottom-4 left-1/2 -translate-x-1/2 glass rounded-full px-4 py-1.5 flex items-center gap-2 z-20">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-white/30">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/>
            </svg>
            <span class="text-[10px] text-white/30 tracking-wider">QR Verified Product</span>
          </div>
        </div>
      </section>

      <!-- ═══ PRODUCT DETAILS — BOTTOM HALF ═══ -->
      <section class="relative z-10 -mt-6 rounded-t-[28px] bg-[#0a0e17] border-t border-white/[0.06]" style="box-shadow: 0 -20px 60px rgba(0,0,0,0.5);">
        <div class="px-6 pt-8 pb-4 max-w-lg mx-auto">

          <!-- Category + SKU row -->
          <div class="flex items-center justify-between mb-3" id="cat-row">
            <span class="text-[10px] tracking-[0.25em] uppercase font-medium px-3 py-1 rounded-full"
                  style="background: ${accent.ring}; color: ${accent.primary}; border: 1px solid ${accent.ring};">
              ${p.category}
            </span>
            <span class="text-[10px] tracking-[0.2em] text-white/20 font-mono">${p.sku}</span>
          </div>

          <!-- Product Name -->
          <h1 id="prod-name" class="font-heading text-2xl md:text-3xl font-semibold text-white leading-tight mb-2">${p.name}</h1>

          <!-- Price -->
          <div id="prod-price" class="flex items-baseline gap-2 mb-5">
            <span class="font-heading text-3xl font-bold" style="color: ${accent.primary};">Rs. ${p.price}</span>
            ${size ? `<span class="text-white/25 text-sm font-light">/ ${size}</span>` : ''}
          </div>

          <!-- Description -->
          <div id="prod-desc" class="glass rounded-2xl p-5 mb-5">
            <p class="text-white/50 text-[14px] font-light leading-relaxed">${p.desc}</p>
          </div>

          <!-- Variants -->
          ${variants.length > 1 ? `
          <div id="prod-variants" class="mb-5">
            <p class="text-[10px] tracking-[0.25em] text-white/25 uppercase mb-3">Available Sizes</p>
            <div class="flex gap-2 flex-wrap">
              ${variants.map(v => {
                const vs = getSize(v.name, v.volume);
                const active = v.id === p.id;
                return `<a href="?id=${v.id}" class="variant-pill glass px-4 py-2 rounded-xl text-sm tracking-wider ${active ? 'active' : 'text-white/35 hover:text-white/60'}">${vs}</a>`;
              }).join('')}
            </div>
          </div>` : ''}

          <!-- Stock -->
          <div id="prod-stock" class="flex items-center gap-2.5 mb-8">
            <span class="stock-dot ${si.cls}"></span>
            <span class="text-sm font-light" style="color: ${si.color};">${si.label}</span>
            <span class="text-white/15 text-[11px]">&middot; ${p.stock} units</span>
          </div>

          <!-- ═══ ORDER VIA WHATSAPP — THE PEAK BUTTON ═══ -->
          <button id="order-btn" onclick="handleOrder()"
                  class="w-full py-5 rounded-2xl text-white font-heading font-semibold text-base tracking-wider relative"
                  style="background: linear-gradient(135deg, #25D366, #128C7E); box-shadow: 0 8px 32px rgba(37,211,102,0.3);">
            <span class="btn-content">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
              </svg>
              <span>Order via WhatsApp</span>
            </span>
            <div class="btn-shine"></div>
            <!-- Checkmark SVG for morph animation -->
            <svg class="check-svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
              <circle cx="18" cy="18" r="16" stroke="white" stroke-width="2" opacity="0.3"/>
              <path id="check-path" d="M11 18 L16 23 L25 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                    stroke-dasharray="22" stroke-dashoffset="22"/>
            </svg>
          </button>

          <!-- Secondary link -->
          <a href="/shop.html" class="block text-center text-white/25 text-xs tracking-wider mt-4 py-3 hover:text-white/40 transition">
            &larr; Browse All Products
          </a>

        </div>

        <!-- Footer -->
        <footer class="border-t border-white/[0.04] py-6 px-6 text-center safe-bottom">
          <div class="flex items-center justify-center gap-2 mb-2">
            <img src="../assets/purex_icon.png" alt="Purex" class="w-5 h-5 object-contain opacity-30">
            <span class="text-[10px] tracking-[0.2em] text-white/20 font-heading">PUREX CHEMICALS</span>
          </div>
          <p class="text-[10px] text-white/10">&copy; 2026 All rights reserved.</p>
          <p class="text-[8px] text-white/8 mt-0.5">Powered by <a href="mailto:hello@quartermasters.me" class="hover:text-white/15 transition-colors">Quartermasters FZC</a></p>
        </footer>
      </section>
    `;

    // ─── ENTRANCE ANIMATIONS ───
    runAnimations(accent);
  }

  // ═══════════════════════════════════════════════
  // GSAP ENTRANCE ANIMATIONS
  // ═══════════════════════════════════════════════
  function runAnimations(accent) {
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Hero visual
    tl.from('#product-visual', { scale: 0.7, opacity: 0, duration: 0.8, ease: 'back.out(1.4)' }, 0)
      .from('.ring', { scale: 0, opacity: 0, duration: 1, stagger: 0.12, ease: 'power2.out' }, 0.1)
      .from('#qr-badge', { y: 20, opacity: 0, duration: 0.5 }, 0.6)
      .from('#back-btn', { x: -20, opacity: 0, duration: 0.4 }, 0.2);

    // Details section
    tl.from('#cat-row', { y: 20, opacity: 0, duration: 0.5 }, 0.4)
      .from('#prod-name', { y: 24, opacity: 0, duration: 0.5 }, 0.5)
      .from('#prod-price', { y: 24, opacity: 0, duration: 0.5 }, 0.6)
      .from('#prod-desc', { y: 24, opacity: 0, duration: 0.5 }, 0.7)
      .from('#prod-variants', { y: 20, opacity: 0, duration: 0.4 }, 0.8)
      .from('#prod-stock', { y: 16, opacity: 0, duration: 0.4 }, 0.85);

    // Order button — dramatic entrance
    tl.from('#order-btn', { y: 40, opacity: 0, scale: 0.95, duration: 0.6, ease: 'back.out(1.6)' }, 0.9);

    // Button shine loop
    gsap.to('#order-btn .btn-shine', {
      x: '200%', duration: 2.5, repeat: -1, repeatDelay: 3, ease: 'power2.inOut'
    });

    // WhatsApp pulse
    gsap.to('#wa-ping', { scale: 1.5, opacity: 0, duration: 1.5, repeat: -1, ease: 'power2.out' });
  }

  // ═══════════════════════════════════════════════
  // PEAK-END ORDER BUTTON — PHYSICS-BASED MORPH
  // Spring parameters: mass=1, tension=170, friction=26
  // Translated to GSAP: elastic.out with period ~0.45, amplitude ~1.2
  // ═══════════════════════════════════════════════
  let orderInProgress = false;

  function handleOrder() {
    if (orderInProgress) return;
    orderInProgress = true;

    const btn = document.getElementById('order-btn');
    const content = btn.querySelector('.btn-content');
    const shine = btn.querySelector('.btn-shine');
    const checkSvg = btn.querySelector('.check-svg');
    const checkPath = document.getElementById('check-path');
    const url = waURL(product);

    // Kill any running shine animation
    gsap.killTweensOf(shine);

    // ─── PHASE 1: Compress (spring tension builds) ───
    const morphTL = gsap.timeline();

    morphTL
      // Squeeze down — spring compression
      .to(btn, {
        scaleX: 0.92, scaleY: 1.06,
        duration: 0.15, ease: 'power2.in'
      })
      // Morph to circle — spring release with physics params
      // mass=1, tension=170, friction=26 → elastic.out(1.2, 0.45)
      .to(btn, {
        width: 64, height: 64,
        borderRadius: '50%',
        padding: 0,
        duration: 0.6,
        scaleX: 1, scaleY: 1,
        ease: 'elastic.out(1.2, 0.45)',
      }, 0.15)
      // Fade out text content
      .to(content, {
        opacity: 0, scale: 0.5,
        duration: 0.2, ease: 'power3.in'
      }, 0.1)
      // Background shifts to solid green
      .to(btn, {
        background: '#25D366',
        boxShadow: '0 0 40px rgba(37,211,102,0.5)',
        duration: 0.3,
      }, 0.2)

    // ─── PHASE 2: Checkmark draws with spring bounce ───
      .to(checkSvg, {
        opacity: 1, duration: 0.1
      }, 0.55)
      .to(checkPath, {
        strokeDashoffset: 0,
        duration: 0.5,
        ease: 'elastic.out(1.2, 0.45)'
      }, 0.6)

    // ─── PHASE 3: Secondary damping oscillation (bounce settle) ───
      .to(btn, {
        scale: 1.15,
        duration: 0.2,
        ease: 'power2.out'
      }, 0.8)
      .to(btn, {
        scale: 0.95,
        duration: 0.15,
        ease: 'power2.inOut'
      }, 1.0)
      .to(btn, {
        scale: 1.05,
        duration: 0.12,
        ease: 'power2.inOut'
      }, 1.15)
      .to(btn, {
        scale: 1,
        duration: 0.2,
        ease: 'power2.out'
      }, 1.27)

    // ─── PHASE 4: Hold, then redirect ───
      .to(btn, {
        boxShadow: '0 0 60px rgba(37,211,102,0.6)',
        duration: 0.3,
        yoyo: true,
        repeat: 1
      }, 1.3)
      .call(() => {
        // Redirect to WhatsApp
        safeExternalOpen(url);

        // Reset button after redirect
        setTimeout(() => {
          resetButton(btn, content, checkSvg, checkPath, shine);
          orderInProgress = false;
        }, 600);
      }, null, 2.0);
  }

  function resetButton(btn, content, checkSvg, checkPath, shine) {
    gsap.set(btn, {
      clearProps: 'width,height,borderRadius,padding,scale,scaleX,scaleY,background,boxShadow'
    });
    gsap.set(content, { clearProps: 'opacity,scale' });
    gsap.set(checkSvg, { opacity: 0 });
    gsap.set(checkPath, { strokeDashoffset: 22 });

    // Restart shine
    gsap.to(shine, {
      x: '200%', duration: 2.5, repeat: -1, repeatDelay: 3, ease: 'power2.inOut'
    });
  }
  </script>
</body>
