<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="../assets/purex_icon.png">
  <meta name="theme-color" content="#0a0e17">
  <title id="page-title">Product — PUREX Chemicals</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { purex: { blue: '#4d9ed5', dark: '#0a0e17' } },
          fontFamily: {
            heading: ['"Plus Jakarta Sans"', '"Poppins"', 'sans-serif'],
            body: ['"Inter"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: #0a0e17; color: #f7f7f7; font-family: 'Inter', sans-serif; overflow-x: hidden; min-height: 100vh; min-height: 100dvh; -webkit-font-smoothing: antialiased; }

    /* Glassmorphism */
    .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.08); }

    /* Grain overlay */
    .grain { position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }

    /* Product hero gradient per category */
    .hero-cleaning { background: linear-gradient(180deg, rgba(77,158,213,0.18) 0%, rgba(77,158,213,0.03) 60%, #0a0e17 100%); }
    .hero-whitener { background: linear-gradient(180deg, rgba(99,102,241,0.18) 0%, rgba(99,102,241,0.03) 60%, #0a0e17 100%); }
    .hero-soap     { background: linear-gradient(180deg, rgba(168,85,247,0.18) 0%, rgba(168,85,247,0.03) 60%, #0a0e17 100%); }
    .hero-bleach   { background: linear-gradient(180deg, rgba(6,182,212,0.18) 0%, rgba(6,182,212,0.03) 60%, #0a0e17 100%); }

    /* Product image shimmer */
    .product-visual { position: relative; overflow: hidden; }
    .product-visual::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.03) 45%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 55%, transparent 60%);
      animation: sheen 4s ease-in-out infinite;
    }
    @keyframes sheen { 0%,100% { transform: translateX(-120%); } 50% { transform: translateX(120%); } }

    /* Floating rings */
    .ring { border-radius: 50%; border: 1px solid rgba(255,255,255,0.04); position: absolute; }

    /* Order button */
    #order-btn {
      position: relative; overflow: hidden; cursor: pointer;
      transition: box-shadow 0.3s ease;
    }
    #order-btn:active { transform: scale(0.97); }
    #order-btn .btn-shine {
      position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.1) 50%, transparent 65%);
      transform: translateX(-100%);
    }

    /* Checkmark SVG for morph */
    #order-btn .check-svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0; }
    #order-btn .btn-content { display: flex; align-items: center; justify-content: center; gap: 12px; }

    /* Variant pills */
    .variant-pill { transition: all 0.25s cubic-bezier(0.22,1,0.36,1); }
    .variant-pill.active { background: rgba(77,158,213,0.15); border-color: rgba(77,158,213,0.4); color: #7bb8e0; }

    /* Stock dot */
    .stock-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .stock-high { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.4); }
    .stock-med  { background: #fbbf24; box-shadow: 0 0 8px rgba(251,191,36,0.4); }
    .stock-low  { background: #f87171; box-shadow: 0 0 8px rgba(248,113,113,0.4); }

    /* Safe area for notched phones */
    .safe-bottom { padding-bottom: max(24px, env(safe-area-inset-bottom)); }
  </style>
</head>
<body>
  <div class="grain"></div>

  <!-- ─── FLOATING WHATSAPP WIDGET ─── -->

      </svg>
    </div>
  </a>

  <script>
  // ═══════════════════════════════════════════════
  // PRODUCT DATA
  // ═══════════════════════════════════════════════
  const products = [
    { id: 1, sku: 'PX-TZB-500', name: 'Taizab Cleaning Acid 500ml', category: 'Cleaning', price: 120, stock: 85, desc: 'Powerful cleaning acid for tough stains on tiles, marble, and bathroom surfaces. Effective formula for deep cleaning.' },
    { id: 2, sku: 'PX-TZB-1L', name: 'Taizab Cleaning Acid 1L', category: 'Cleaning', price: 220, stock: 120, desc: 'Economy size cleaning acid. Ideal for heavy-duty cleaning of floors, drains, and industrial surfaces.' },
    { id: 3, sku: 'PX-TZB-2L', name: 'Taizab Cleaning Acid 2L', category: 'Cleaning', price: 400, stock: 45, desc: 'Bulk cleaning acid for commercial and industrial use. Maximum value for large-scale cleaning operations.' },
    { id: 4, sku: 'PX-SWP-F5', name: 'Sweep Floor Cleaner 500ml', category: 'Cleaning', price: 95, stock: 60, desc: 'Fragrant floor cleaner that leaves surfaces sparkling clean. Suitable for all floor types including marble and tiles.' },
    { id: 5, sku: 'PX-SWP-F1', name: 'Sweep Floor Cleaner 1L', category: 'Cleaning', price: 180, stock: 90, desc: 'Large bottle floor cleaner for daily use. Pleasant fragrance that keeps your home fresh all day.' },
    { id: 6, sku: 'PX-SWP-F2', name: 'Sweep Floor Cleaner 2L', category: 'Cleaning', price: 340, stock: 30, desc: 'Family-size floor cleaner. Best value for households and offices with large floor areas.' },
    { id: 7, sku: 'PX-SWP-T5', name: 'Sweep Toilet Cleaner 500ml', category: 'Cleaning', price: 110, stock: 75, desc: 'Specialized toilet bowl cleaner with angled nozzle. Kills 99.9% germs and removes tough stains.' },
    { id: 8, sku: 'PX-SWP-T1', name: 'Sweep Toilet Cleaner 1L', category: 'Cleaning', price: 200, stock: 55, desc: 'Large toilet cleaner for commercial and household use. Powerful formula for complete toilet hygiene.' },
    { id: 9, sku: 'PX-NEL-100', name: 'Neel Fabric Whitener 100ml', category: 'Whitener', price: 45, stock: 200, desc: 'Traditional fabric whitener for brilliant white clothes. Trusted formula used in Pakistani households for generations.' },
    { id: 10, sku: 'PX-NEL-250', name: 'Neel Fabric Whitener 250ml', category: 'Whitener', price: 90, stock: 150, desc: 'Medium bottle fabric whitener. Perfect for regular laundry needs. Restores whiteness to dull fabrics.' },
    { id: 11, sku: 'PX-NEL-500', name: 'Neel Fabric Whitener 500ml', category: 'Whitener', price: 160, stock: 95, desc: 'Large fabric whitener for bulk laundry. Ideal for laundry businesses and large families.' },
    { id: 12, sku: 'PX-CSB-200', name: 'Clothes Soap Bar 200g', category: 'Soap', price: 55, stock: 180, desc: 'Premium clothes washing soap bar. Gentle on fabrics, tough on stains. Produces rich lather.' },
    { id: 13, sku: 'PX-CSB-400', name: 'Clothes Soap Bar 400g', category: 'Soap', price: 95, stock: 140, desc: 'Large clothes soap bar for extended use. Removes grease, dirt, and collar stains effectively.' },
    { id: 14, sku: 'PX-BSB-100', name: 'Bath Soap Bar 100g', category: 'Soap', price: 65, stock: 160, desc: 'Moisturizing bath soap with gentle fragrance. Suitable for all skin types including sensitive skin.' },
    { id: 15, sku: 'PX-BSB-150', name: 'Bath Soap Bar 150g', category: 'Soap', price: 90, stock: 130, desc: 'Premium bath soap bar with long-lasting fragrance. Leaves skin soft, clean, and refreshed.' },
    { id: 16, sku: 'PX-DSB-200', name: 'Dish Soap Bar 200g', category: 'Soap', price: 50, stock: 170, desc: 'Heavy-duty dish washing soap. Cuts through grease and food residue. Safe for all utensils.' },
    { id: 17, sku: 'PX-DSL-500', name: 'Dish Soap Liquid 500ml', category: 'Soap', price: 140, stock: 80, desc: 'Liquid dish soap with concentrated formula. A small amount goes a long way. Gentle on hands.' },
    { id: 18, sku: 'PX-BLC-500', name: 'Bleach 500ml', category: 'Bleach', price: 75, stock: 110, desc: 'Multi-purpose bleach for cleaning, whitening, and disinfecting. Essential household cleaning supply.' },
    { id: 19, sku: 'PX-BLC-1L', name: 'Bleach 1L', category: 'Bleach', price: 130, stock: 85, desc: 'Large bottle bleach for thorough home sanitization. Effective against bacteria, viruses, and mold.' },
    { id: 20, sku: 'PX-BLC-2L', name: 'Bleach 2L', category: 'Bleach', price: 240, stock: 40, desc: 'Bulk bleach for commercial cleaning. Maximum cleaning and sanitizing power at the best value.' },
  ];

  // ═══════════════════════════════════════════════
  // HELPERS
  // ═══════════════════════════════════════════════
  const catAccent = {
    Cleaning: { primary: '#4d9ed5', glow: 'rgba(77,158,213,0.35)', hero: 'hero-cleaning', ring: 'rgba(77,158,213,0.08)' },
    Whitener: { primary: '#6366f1', glow: 'rgba(99,102,241,0.35)', hero: 'hero-whitener', ring: 'rgba(99,102,241,0.08)' },
    Soap:     { primary: '#a855f7', glow: 'rgba(168,85,247,0.35)', hero: 'hero-soap',     ring: 'rgba(168,85,247,0.08)' },
    Bleach:   { primary: '#06b6d4', glow: 'rgba(6,182,212,0.35)',  hero: 'hero-bleach',   ring: 'rgba(6,182,212,0.08)' },
  };

  function getSize(name) { const m = name.match(/(\d+(?:ml|L|g))/i); return m ? m[1] : ''; }
  function getInitial(p) {
    if (p.name.startsWith('Taizab')) return 'TZ';
    if (p.name.startsWith('Sweep Floor')) return 'SF';
    if (p.name.startsWith('Sweep Toilet')) return 'ST';
    if (p.name.startsWith('Neel')) return 'NL';
    if (p.name.startsWith('Clothes Soap')) return 'CS';
    if (p.name.startsWith('Bath Soap')) return 'BS';
    if (p.name.startsWith('Dish Soap Bar')) return 'DB';
    if (p.name.startsWith('Dish Soap Liquid')) return 'DL';
    if (p.name.startsWith('Bleach')) return 'BL';
    return p.name.slice(0, 2).toUpperCase();
  }
  function getLineName(name) { return name.replace(/\s*\d+(?:ml|L|g)/i, '').trim(); }
  function stockInfo(s) {
    if (s >= 100) return { cls: 'stock-high', label: 'In Stock', color: '#4ade80' };
    if (s >= 50)  return { cls: 'stock-med',  label: 'Available', color: '#fbbf24' };
    return { cls: 'stock-low', label: 'Low Stock', color: '#f87171' };
  }
  function waURL(p) {
    return `https://wa.me/923400145796?text=${encodeURIComponent(`Hi, I'd like to order ${p.name} (${p.sku}) — Rs. ${p.price}. Please confirm availability.`)}`;
  }

  // ═══════════════════════════════════════════════
  // ROUTING
  // ═══════════════════════════════════════════════
  const params = new URLSearchParams(location.search);
  const product = params.get('id')
    ? products.find(p => p.id === +params.get('id'))
    : params.get('sku')
      ? products.find(p => p.sku.toLowerCase() === params.get('sku').toLowerCase())
      : null;

  if (!product) {
    // Redirect to shop if no valid product
    location.href = 'shop.html';
  } else {
    document.getElementById('page-title').textContent = `${product.name} — PUREX`;
    render(product);
  }

  // ═══════════════════════════════════════════════
  // RENDER — MOBILE-FIRST PRODUCT PAGE
  // ═══════════════════════════════════════════════
  function render(p) {
    const accent = catAccent[p.category];
    const size = getSize(p.name);
    const initials = getInitial(p);
    const si = stockInfo(p.stock);
    const line = getLineName(p.name);
    const variants = products.filter(v => getLineName(v.name) === line);

    // Update floating WA link
    const waFloat = document.getElementById('wa-float');
    waFloat.href = waURL(p);

    document.getElementById('app').innerHTML = `
      <!-- ═══ PRODUCT HERO — TOP HALF ═══ -->
      <section class="${accent.hero} relative" style="min-height: 52vh; min-height: 52dvh;">
        <!-- Top bar -->
        <div class="relative z-20 flex items-center justify-between px-5 pt-5 pb-2" style="padding-top: max(20px, env(safe-area-inset-top));">
          <a href="shop.html" class="w-10 h-10 rounded-full glass flex items-center justify-center" id="back-btn">
            <svg width="18" height="18" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"><path d="M11 4L5 9l6 5"/></svg>
          </a>
          <a href="index.html" class="flex items-center gap-2 opacity-70">
            <img src="../assets/purex_icon.png" alt="Purex" class="w-7 h-7 object-contain">
            <span class="font-heading text-xs tracking-[0.2em] text-white/70">PUREX</span>
          </a>
          <div class="w-10"></div>
        </div>

        <!-- Product visual -->
        <div class="relative flex items-center justify-center" style="height: calc(52vh - 80px); height: calc(52dvh - 80px);">
          <!-- Ambient rings -->
          <div class="ring w-[280px] h-[280px] md:w-[360px] md:h-[360px]" style="border-color: ${accent.ring}; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
          <div class="ring w-[200px] h-[200px] md:w-[260px] md:h-[260px]" style="border-color: ${accent.ring}; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>
          <div class="ring w-[120px] h-[120px] md:w-[160px] md:h-[160px]" style="border-color: ${accent.ring}; top: 50%; left: 50%; transform: translate(-50%, -50%);"></div>

          <!-- Central product placeholder -->
          <div id="product-visual" class="product-visual relative z-10 w-40 h-40 md:w-52 md:h-52 rounded-[32px] flex flex-col items-center justify-center"
               style="background: linear-gradient(135deg, ${accent.ring}, rgba(255,255,255,0.03)); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 0 80px ${accent.glow};">
            <span class="font-heading text-5xl md:text-6xl font-bold" style="color: ${accent.primary}; opacity: 0.8;">${initials}</span>
            <span class="text-[11px] tracking-[0.25em] text-white/30 mt-1 uppercase">${size}</span>
          </div>

          <!-- QR Badge -->
          <div id="qr-badge" class="absolute bottom-4 left-1/2 -translate-x-1/2 glass rounded-full px-4 py-1.5 flex items-center gap-2 z-20">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="text-white/30">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/>
            </svg>
            <span class="text-[10px] text-white/30 tracking-wider">QR Verified Product</span>
          </div>
        </div>
      </section>

      <!-- ═══ PRODUCT DETAILS — BOTTOM HALF ═══ -->
      <section class="relative z-10 -mt-6 rounded-t-[28px] bg-[#0a0e17] border-t border-white/[0.06]" style="box-shadow: 0 -20px 60px rgba(0,0,0,0.5);">
        <div class="px-6 pt-8 pb-4 max-w-lg mx-auto">

          <!-- Category + SKU row -->
          <div class="flex items-center justify-between mb-3" id="cat-row">
            <span class="text-[10px] tracking-[0.25em] uppercase font-medium px-3 py-1 rounded-full"
                  style="background: ${accent.ring}; color: ${accent.primary}; border: 1px solid ${accent.ring};">
              ${p.category}
            </span>
            <span class="text-[10px] tracking-[0.2em] text-white/20 font-mono">${p.sku}</span>
          </div>

          <!-- Product Name -->
          <h1 id="prod-name" class="font-heading text-2xl md:text-3xl font-semibold text-white leading-tight mb-2">${p.name}</h1>

          <!-- Price -->
          <div id="prod-price" class="flex items-baseline gap-2 mb-5">
            <span class="font-heading text-3xl font-bold" style="color: ${accent.primary};">Rs. ${p.price}</span>
            ${size ? `<span class="text-white/25 text-sm font-light">/ ${size}</span>` : ''}
          </div>

          <!-- Description -->
          <div id="prod-desc" class="glass rounded-2xl p-5 mb-5">
            <p class="text-white/50 text-[14px] font-light leading-relaxed">${p.desc}</p>
          </div>

          <!-- Variants -->
          ${variants.length > 1 ? `
          <div id="prod-variants" class="mb-5">
            <p class="text-[10px] tracking-[0.25em] text-white/25 uppercase mb-3">Available Sizes</p>
            <div class="flex gap-2 flex-wrap">
              ${variants.map(v => {
                const vs = getSize(v.name);
                const active = v.id === p.id;
                return `<a href="?id=${v.id}" class="variant-pill glass px-4 py-2 rounded-xl text-sm tracking-wider ${active ? 'active' : 'text-white/35 hover:text-white/60'}">${vs}</a>`;
              }).join('')}
            </div>
          </div>` : ''}

          <!-- Stock -->
          <div id="prod-stock" class="flex items-center gap-2.5 mb-8">
            <span class="stock-dot ${si.cls}"></span>
            <span class="text-sm font-light" style="color: ${si.color};">${si.label}</span>
            <span class="text-white/15 text-[11px]">&middot; ${p.stock} units</span>
          </div>

          <!-- ═══ ORDER VIA WHATSAPP — THE PEAK BUTTON ═══ -->
          <button id="order-btn" onclick="handleOrder()"
                  class="w-full py-5 rounded-2xl text-white font-heading font-semibold text-base tracking-wider relative"
                  style="background: linear-gradient(135deg, #25D366, #128C7E); box-shadow: 0 8px 32px rgba(37,211,102,0.3);">
            <span class="btn-content">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
              </svg>
              <span>Order via WhatsApp</span>
            </span>
            <div class="btn-shine"></div>
            <!-- Checkmark SVG for morph animation -->
            <svg class="check-svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
              <circle cx="18" cy="18" r="16" stroke="white" stroke-width="2" opacity="0.3"/>
              <path id="check-path" d="M11 18 L16 23 L25 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                    stroke-dasharray="22" stroke-dashoffset="22"/>
            </svg>
          </button>

          <!-- Secondary link -->
          <a href="shop.html" class="block text-center text-white/25 text-xs tracking-wider mt-4 py-3 hover:text-white/40 transition">
            &larr; Browse All Products
          </a>

        </div>

        <!-- Footer -->
        <footer class="border-t border-white/[0.04] py-6 px-6 text-center safe-bottom">
          <div class="flex items-center justify-center gap-2 mb-2">
            <img src="../assets/purex_icon.png" alt="Purex" class="w-5 h-5 object-contain opacity-30">
            <span class="text-[10px] tracking-[0.2em] text-white/20 font-heading">PUREX CHEMICALS</span>
          </div>
          <p class="text-[10px] text-white/10">&copy; 2026 All rights reserved.</p>
        </footer>
      </section>
    `;

    // ─── ENTRANCE ANIMATIONS ───
    runAnimations(accent);
  }

  // ═══════════════════════════════════════════════
  // GSAP ENTRANCE ANIMATIONS
  // ═══════════════════════════════════════════════
  function runAnimations(accent) {
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Hero visual
    tl.from('#product-visual', { scale: 0.7, opacity: 0, duration: 0.8, ease: 'back.out(1.4)' }, 0)
      .from('.ring', { scale: 0, opacity: 0, duration: 1, stagger: 0.12, ease: 'power2.out' }, 0.1)
      .from('#qr-badge', { y: 20, opacity: 0, duration: 0.5 }, 0.6)
      .from('#back-btn', { x: -20, opacity: 0, duration: 0.4 }, 0.2);

    // Details section
    tl.from('#cat-row', { y: 20, opacity: 0, duration: 0.5 }, 0.4)
      .from('#prod-name', { y: 24, opacity: 0, duration: 0.5 }, 0.5)
      .from('#prod-price', { y: 24, opacity: 0, duration: 0.5 }, 0.6)
      .from('#prod-desc', { y: 24, opacity: 0, duration: 0.5 }, 0.7)
      .from('#prod-variants', { y: 20, opacity: 0, duration: 0.4 }, 0.8)
      .from('#prod-stock', { y: 16, opacity: 0, duration: 0.4 }, 0.85);

    // Order button — dramatic entrance
    tl.from('#order-btn', { y: 40, opacity: 0, scale: 0.95, duration: 0.6, ease: 'back.out(1.6)' }, 0.9);

    // Button shine loop
    gsap.to('#order-btn .btn-shine', {
      x: '200%', duration: 2.5, repeat: -1, repeatDelay: 3, ease: 'power2.inOut'
    });

    // WhatsApp pulse
    gsap.to('#wa-ping', { scale: 1.5, opacity: 0, duration: 1.5, repeat: -1, ease: 'power2.out' });
  }

  // ═══════════════════════════════════════════════
  // PEAK-END ORDER BUTTON — PHYSICS-BASED MORPH
  // Spring parameters: mass=1, tension=170, friction=26
  // Translated to GSAP: elastic.out with period ~0.45, amplitude ~1.2
  // ═══════════════════════════════════════════════
  let orderInProgress = false;

  function handleOrder() {
    if (orderInProgress) return;
    orderInProgress = true;

    const btn = document.getElementById('order-btn');
    const content = btn.querySelector('.btn-content');
    const shine = btn.querySelector('.btn-shine');
    const checkSvg = btn.querySelector('.check-svg');
    const checkPath = document.getElementById('check-path');
    const url = waURL(product);

    // Kill any running shine animation
    gsap.killTweensOf(shine);

    // ─── PHASE 1: Compress (spring tension builds) ───
    const morphTL = gsap.timeline();

    morphTL
      // Squeeze down — spring compression
      .to(btn, {
        scaleX: 0.92, scaleY: 1.06,
        duration: 0.15, ease: 'power2.in'
      })
      // Morph to circle — spring release with physics params
      // mass=1, tension=170, friction=26 → elastic.out(1.2, 0.45)
      .to(btn, {
        width: 64, height: 64,
        borderRadius: '50%',
        padding: 0,
        duration: 0.6,
        scaleX: 1, scaleY: 1,
        ease: 'elastic.out(1.2, 0.45)',
      }, 0.15)
      // Fade out text content
      .to(content, {
        opacity: 0, scale: 0.5,
        duration: 0.2, ease: 'power3.in'
      }, 0.1)
      // Background shifts to solid green
      .to(btn, {
        background: '#25D366',
        boxShadow: '0 0 40px rgba(37,211,102,0.5)',
        duration: 0.3,
      }, 0.2)

    // ─── PHASE 2: Checkmark draws with spring bounce ───
      .to(checkSvg, {
        opacity: 1, duration: 0.1
      }, 0.55)
      .to(checkPath, {
        strokeDashoffset: 0,
        duration: 0.5,
        ease: 'elastic.out(1.2, 0.45)'
      }, 0.6)

    // ─── PHASE 3: Secondary damping oscillation (bounce settle) ───
      .to(btn, {
        scale: 1.15,
        duration: 0.2,
        ease: 'power2.out'
      }, 0.8)
      .to(btn, {
        scale: 0.95,
        duration: 0.15,
        ease: 'power2.inOut'
      }, 1.0)
      .to(btn, {
        scale: 1.05,
        duration: 0.12,
        ease: 'power2.inOut'
      }, 1.15)
      .to(btn, {
        scale: 1,
        duration: 0.2,
        ease: 'power2.out'
      }, 1.27)

    // ─── PHASE 4: Hold, then redirect ───
      .to(btn, {
        boxShadow: '0 0 60px rgba(37,211,102,0.6)',
        duration: 0.3,
        yoyo: true,
        repeat: 1
      }, 1.3)
      .call(() => {
        // Redirect to WhatsApp
        window.open(url, '_blank');

        // Reset button after redirect
        setTimeout(() => {
          resetButton(btn, content, checkSvg, checkPath, shine);
          orderInProgress = false;
        }, 600);
      }, null, 2.0);
  }

  function resetButton(btn, content, checkSvg, checkPath, shine) {
    gsap.set(btn, {
      clearProps: 'width,height,borderRadius,padding,scale,scaleX,scaleY,background,boxShadow'
    });
    gsap.set(content, { clearProps: 'opacity,scale' });
    gsap.set(checkSvg, { opacity: 0 });
    gsap.set(checkPath, { strokeDashoffset: 22 });

    // Restart shine
    gsap.to(shine, {
      x: '200%', duration: 2.5, repeat: -1, repeatDelay: 3, ease: 'power2.inOut'
    });
  }
  </script>
</body>
