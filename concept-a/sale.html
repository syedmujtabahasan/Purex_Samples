  <script>
    function showDescModal(name, desc) {
      const modal = document.getElementById('desc-modal');
      document.getElementById('desc-modal-title').textContent = name;
      document.getElementById('desc-modal-body').textContent = desc;
      modal.style.opacity = '1';
      modal.style.pointerEvents = 'auto';
      document.getElementById('desc-panel').style.transform = 'scale(1)';
    }
    function closeDescModal() {
      const modal = document.getElementById('desc-modal');
      document.getElementById('desc-panel').style.transform = 'scale(0.95)';
      modal.style.opacity = '0';
      modal.style.pointerEvents = 'none';
    }
    document.getElementById('desc-modal').addEventListener('click', function(e) {
      if (e.target === this) closeDescModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && document.getElementById('desc-modal').style.opacity === '1') closeDescModal();
    });
  </script>

    function loadProducts() {
      try {
        const saved = localStorage.getItem('purex_products');
        if (saved) return JSON.parse(saved);
      } catch(e) {}
      localStorage.setItem('purex_products', JSON.stringify(DEFAULT_PRODUCTS));
      return DEFAULT_PRODUCTS;
    }

    const allProducts = loadProducts();
    // Only show active products that are on sale
    const saleProducts = allProducts.filter(p => p.status === 'active' && p.onSale && p.salePrice > 0);

    let cart = [];

    function loadCart() {
      try {
        const saved = localStorage.getItem('purex_cart');
        if (saved) { cart = JSON.parse(saved); updateCartUI(); }
      } catch(e) { cart = []; }
    }

    function saveCart() {
      try { localStorage.setItem('purex_cart', JSON.stringify(cart)); } catch(e) {}
    }

    function renderProducts() {
      const grid = document.getElementById('product-grid');
      const noSale = document.getElementById('no-sale');
      const countEl = document.getElementById('sale-count');

      if (saleProducts.length === 0) {
        grid.innerHTML = '';
        noSale.classList.remove('hidden');
        countEl.textContent = '';
        return;
      }

      noSale.classList.add('hidden');
      countEl.textContent = saleProducts.length + ' product' + (saleProducts.length > 1 ? 's' : '') + ' on sale';

      grid.innerHTML = saleProducts.map(p => {
        const discount = Math.round(((p.price - p.salePrice) / p.price) * 100);
        return `
        <div class="product-card sale-card glass-strong rounded-2xl overflow-hidden group">
          <div class="relative h-48 flex items-center justify-center overflow-hidden bg-white/[0.03] rounded-t-2xl">
            <img src="${p.image}" alt="${p.name}" class="h-40 w-40 object-contain transition-transform duration-500 group-hover:scale-110"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="hidden absolute inset-0 items-center justify-center text-white/20">
              <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1"><rect x="8" y="8" width="32" height="32" rx="4"/><circle cx="18" cy="18" r="3"/><path d="M8 32l8-8 6 6 4-4 14 6"/></svg>
            </div>
            <span class="absolute top-3 left-3 text-[11px] tracking-wider uppercase px-2.5 py-1 rounded-full bg-red-500/20 text-red-400 border border-red-500/30 font-medium">${discount}% OFF</span>
            <span class="absolute top-3 right-3 text-[10px] tracking-widest uppercase px-2 py-1 rounded-full glass text-white/50">${p.category}</span>
          </div>
          <div class="p-5">
            <h3 class="font-heading text-sm font-light text-white mb-1">${p.name}</h3>
            <div class="mb-3">
              <span class="text-[10px] text-white/30 tracking-wider">SKU: ${p.sku}</span>
              <span class="text-[10px] text-white/30 ml-1">|</span>
              <span class="text-[10px] text-purex-blue/80 tracking-wider ml-1">${p.volume}</span>
              ${p.desc ? '<p class="text-[10px] text-white/40 mt-1 leading-relaxed">' + p.desc.substring(0, 80) + (p.desc.length > 80 ? '... <button onclick="showDescModal(\'' + p.name.replace(/'/g, "\\'") + '\', \'' + p.desc.replace(/'/g, "\\'").replace(/\n/g, ' ') + '\')" class="text-red-400 hover:underline ml-0.5">Read more</button>' : '') + '</p>' : ''}
            </div>
            <div class="flex items-center justify-between">
              <div>
                <span class="text-lg font-heading font-light text-red-400">Rs.${p.salePrice}</span>
                <span class="text-sm font-heading font-light text-white/30 price-strike ml-2">Rs.${p.price}</span>
              </div>
              <button class="atc-btn bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-2 rounded-full text-xs tracking-wider hover:bg-red-500/20 transition-all flex items-center gap-2"
                      data-product-id="${p.id}" onclick="addToCart(${p.id}, this)">
                <span class="btn-text">Add to Cart</span>
                <svg class="btn-text" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 1v12M1 7h12"/></svg>
              </button>
            </div>
            <a href="https://wa.me/923400145796?text=${encodeURIComponent('Hi, I\'d like to order ' + p.name + ' (' + p.volume + ') at sale price Rs.' + p.salePrice)}" target="_blank" class="mt-3 flex items-center justify-center gap-1.5 text-[11px] text-[#25D366]/70 hover:text-[#25D366] transition">
              <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              Order on WhatsApp
            </a>
          </div>
        </div>`;
      }).join('');

      gsap.from('.product-card', { opacity: 0, y: 30, duration: 0.5, stagger: 0.08, ease: 'power3.out' });
    }

    // Add to cart (uses sale price)
    function addToCart(productId, btnEl) {
      const product = saleProducts.find(p => p.id === productId);
      if (!product) return;

      const btnRect = btnEl.getBoundingClientRect();
      const cartEl = document.getElementById('cart-icon');
      const cartRect = cartEl.getBoundingClientRect();
      const origWidth = btnEl.offsetWidth;
      const origText = btnEl.innerHTML;

      btnEl.style.width = origWidth + 'px';
      btnEl.style.height = btnEl.offsetHeight + 'px';
      btnEl.classList.add('morphing');

      gsap.to(btnEl, {
        width: 44, height: 44, duration: 0.25, ease: 'power2.in',
        onComplete: () => {
          const dot = document.createElement('div');
          dot.className = 'flying-dot';
          dot.style.background = '#ef4444';
          dot.innerHTML = '<svg width="16" height="16" fill="none" stroke="white" stroke-width="2"><path d="M8 1v14M1 8h14"/></svg>';
          document.body.appendChild(dot);

          const newBtnRect = btnEl.getBoundingClientRect();
          gsap.set(dot, { left: newBtnRect.left, top: newBtnRect.top });
          btnEl.style.opacity = '0';

          gsap.to(dot, {
            left: cartRect.left + cartRect.width / 2 - 22,
            top: cartRect.top + cartRect.height / 2 - 22,
            scale: 0.3, duration: 0.6, ease: 'power3.in',
            onComplete: () => {
              dot.remove();
              const badge = document.getElementById('cart-badge');
              badge.classList.add('bounce');
              setTimeout(() => badge.classList.remove('bounce'), 300);

              const existing = cart.find(c => c.id === productId);
              // Use sale price for cart
              if (existing) existing.qty++;
              else cart.push({ ...product, price: product.salePrice, originalPrice: product.price, qty: 1 });
              updateCartUI();

              btnEl.classList.remove('morphing');
              btnEl.style.width = '';
              btnEl.style.height = '';
              btnEl.style.opacity = '1';
              btnEl.innerHTML = origText;
              gsap.fromTo(btnEl, { boxShadow: '0 0 20px rgba(239,68,68,0.5)' }, { boxShadow: '0 0 0px rgba(239,68,68,0)', duration: 0.8 });
            }
          });
          gsap.to(dot, { keyframes: [{ y: -80, duration: 0.3, ease: 'power2.out' }, { y: 0, duration: 0.3, ease: 'power2.in' }] });
        }
      });
    }

    function updateCartUI() {
      const badge = document.getElementById('cart-badge');
      const totalItems = cart.reduce((sum, c) => sum + c.qty, 0);
      badge.textContent = totalItems;
      badge.style.opacity = totalItems > 0 ? '1' : '0';
      badge.style.transform = totalItems > 0 ? 'scale(1)' : 'scale(0)';

      const itemsContainer = document.getElementById('cart-items');
      const totalEl = document.getElementById('cart-total');
      const total = cart.reduce((sum, c) => sum + c.price * c.qty, 0);
      totalEl.textContent = 'Rs.' + total.toLocaleString();
      saveCart();

      if (cart.length === 0) {
        itemsContainer.innerHTML = '<p class="text-white/30 text-sm text-center py-10">Your cart is empty</p>';
        return;
      }

      itemsContainer.innerHTML = cart.map(item => `
        <div class="flex items-center gap-4 glass rounded-xl p-3">
          <div class="w-12 h-12 rounded-lg flex items-center justify-center overflow-hidden bg-white/[0.03]">
            <img src="${item.image}" alt="${item.name}" class="h-10 w-10 object-contain" onerror="this.style.display='none';">
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm text-white font-light truncate">${item.name}</p>
            <p class="text-xs text-white/40">${item.volume} &times; ${item.qty}</p>
          </div>
          <div class="text-right">
            <p class="text-sm text-red-400 font-heading">Rs.${(item.price * item.qty).toLocaleString()}</p>
            <button class="text-[10px] text-white/30 hover:text-red-400 transition mt-1" onclick="removeFromCart(${item.id})">Remove</button>
          </div>
        </div>
      `).join('');
    }

    function removeFromCart(id) {
      cart = cart.filter(c => c.id !== id);
      updateCartUI();
    }

    // Cart sidebar
    document.getElementById('cart-icon').addEventListener('click', () => toggleCart(true));
    document.getElementById('close-cart').addEventListener('click', () => toggleCart(false));
    document.getElementById('cart-overlay').addEventListener('click', () => toggleCart(false));

    function toggleCart(open) {
      const sidebar = document.getElementById('cart-sidebar');
      const overlay = document.getElementById('cart-overlay');
      if (open) {
        sidebar.style.transform = 'translateX(0)';
        overlay.style.opacity = '1';
        overlay.style.pointerEvents = 'auto';
      } else {
        sidebar.style.transform = 'translateX(100%)';
        overlay.style.opacity = '0';
        overlay.style.pointerEvents = 'none';
      }
    }

    // Init
    loadCart();
    renderProducts();
    gsap.to('#wa-ping', { scale: 1.5, opacity: 0, duration: 1.5, repeat: -1, ease: 'power2.out' });
  </script>
</body>
</html>
