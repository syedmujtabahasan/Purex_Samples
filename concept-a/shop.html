    .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: #4d9ed5; transition: width 0.3s ease; }

    .product-card { transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.4s ease; }
    .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 60px rgba(77,158,213,0.1); }
    .atc-btn { position: relative; overflow: hidden; transition: all 0.3s ease; }
    .atc-btn .btn-text { transition: opacity 0.2s ease; }
    .atc-btn.morphing { border-radius: 50% !important; width: 44px !important; height: 44px !important; padding: 0 !important; min-width: unset !important; }
    .atc-btn.morphing .btn-text { opacity: 0; }
    .flying-dot { position: fixed; width: 44px; height: 44px; background: #4d9ed5; border-radius: 50%; z-index: 1000; pointer-events: none; display: flex; align-items: center; justify-content: center; }
    .cart-badge { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .cart-badge.bounce { transform: scale(1.4); }
    .filter-btn { transition: all 0.3s ease; }
    .filter-btn.active { background: rgba(77,158,213,0.15); color: #4d9ed5; border-color: rgba(77,158,213,0.3); }

  <!-- IMAGE ZOOM MODAL -->
  <div id="zoom-modal" class="fixed inset-0 z-[90] flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300 cursor-zoom-out" style="background: rgba(0,0,0,0.85);" onclick="closeZoomModal()">

      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l16 16M22 6L6 22"/></svg>
    </button>
    <img id="zoom-img" src="" alt="" class="max-w-[90vw] max-h-[90vh] object-contain rounded-xl" style="transform: scale(0.9); transition: transform 0.3s ease;">
  </div>

  <script>
    function showDescModal(name, desc, imgSrc) {
      const modal = document.getElementById('desc-modal');
      document.getElementById('desc-modal-title').textContent = name;
      document.getElementById('desc-modal-body').textContent = desc;
      const imgWrap = document.getElementById('desc-modal-img-wrap');
      const img = document.getElementById('desc-modal-img');
      if (imgSrc) {
        img.src = imgSrc;
        imgWrap.classList.remove('hidden');
      } else {
        imgWrap.classList.add('hidden');
      }
      modal.style.opacity = '1';
      modal.style.pointerEvents = 'auto';
      document.getElementById('desc-panel').style.transform = 'scale(1)';
    }
    function closeDescModal() {
      const modal = document.getElementById('desc-modal');
      document.getElementById('desc-panel').style.transform = 'scale(0.95)';
      modal.style.opacity = '0';
      modal.style.pointerEvents = 'none';
    }
    function zoomImage(src) {
      const modal = document.getElementById('zoom-modal');
      const img = document.getElementById('zoom-img');
      img.src = src;
      modal.style.opacity = '1';
      modal.style.pointerEvents = 'auto';
      setTimeout(() => { img.style.transform = 'scale(1)'; }, 10);

    // ─── LOAD PRODUCTS FROM LOCALSTORAGE (shared data store) ───
    function loadProducts() {
      try {
        const saved = localStorage.getItem('purex_products');
        if (saved) {
          return JSON.parse(saved);
        }
      } catch(e) {}
      // Initialize localStorage with defaults if not set
      localStorage.setItem('purex_products', JSON.stringify(DEFAULT_PRODUCTS));
      return DEFAULT_PRODUCTS;
    }

    // Load all products from shared store, then filter to active only
    const allProducts = loadProducts();
    const products = allProducts.filter(p => p.status === 'active');

    let cart = [];
    let currentFilter = 'all';
    let currentSort = 'default';
    let currentSearch = '';

    // ─── LOAD CART FROM LOCALSTORAGE ───
    function loadCart() {
      try {
        const saved = localStorage.getItem('purex_cart');
        if (saved) {
          cart = JSON.parse(saved);
          updateCartUI();
        }
      } catch(e) { cart = []; }
    }

    // ─── SAVE CART TO LOCALSTORAGE ───
    function saveCart() {
      try {
        localStorage.setItem('purex_cart', JSON.stringify(cart));
      } catch(e) {}
    }

    // ─── GET FILTERED & SORTED PRODUCTS ───
    function getFilteredProducts() {
      let filtered = currentFilter === 'all' ? [...products] : products.filter(p => p.category === currentFilter);

      // Search filter
      if (currentSearch.trim()) {
        const q = currentSearch.trim().toLowerCase();
        filtered = filtered.filter(p =>
          p.name.toLowerCase().includes(q) ||
          p.category.toLowerCase().includes(q) ||
          p.sku.toLowerCase().includes(q) ||
          (p.desc || '').toLowerCase().includes(q) ||
          p.volume.toLowerCase().includes(q)
        );
      }

      // Sort
      if (currentSort === 'price-asc') {
        filtered.sort((a, b) => a.price - b.price);
      } else if (currentSort === 'price-desc') {
        filtered.sort((a, b) => b.price - a.price);
      }

      return filtered;
    }

    // ─── ADD TO CART WITH FLY ANIMATION ───
    function addToCart(productId, btnEl) {
      const product = products.find(p => p.id === productId);
      if (!product) return;

      // Get positions
      const btnRect = btnEl.getBoundingClientRect();
      const cartEl = document.getElementById('cart-icon');
      const cartRect = cartEl.getBoundingClientRect();

      // Save original styles
      const origWidth = btnEl.offsetWidth;
      const origHeight = btnEl.offsetHeight;
      const origText = btnEl.innerHTML;

      // Phase 1: Morph button into a sphere
      btnEl.style.width = origWidth + 'px';
      btnEl.style.height = origHeight + 'px';
      btnEl.classList.add('morphing');

      gsap.to(btnEl, {
        width: 44, height: 44,
        duration: 0.25,
        ease: 'power2.in',
        onComplete: () => {
          // Phase 2: Create flying dot
          const dot = document.createElement('div');
          dot.className = 'flying-dot';
          dot.innerHTML = '<svg width="16" height="16" fill="none" stroke="white" stroke-width="2"><path d="M8 1v14M1 8h14"/></svg>';
          document.body.appendChild(dot);

          const newBtnRect = btnEl.getBoundingClientRect();
          gsap.set(dot, { left: newBtnRect.left, top: newBtnRect.top });

          // Hide original button temporarily
          btnEl.style.opacity = '0';

          // Fly to cart with arc
          gsap.to(dot, {
            left: cartRect.left + cartRect.width / 2 - 22,
            top: cartRect.top + cartRect.height / 2 - 22,
            scale: 0.3,
            duration: 0.6,
            ease: 'power3.in',
            motionPath: undefined,
            onComplete: () => {
              dot.remove();

              // Bounce the cart badge (Peak-End rule: memorable ending)
              const badge = document.getElementById('cart-badge');
              badge.classList.add('bounce');
              setTimeout(() => badge.classList.remove('bounce'), 300);

              // Update cart
              const existing = cart.find(c => c.id === productId);
              if (existing) existing.qty++;
              else cart.push({ ...product, qty: 1 });
              updateCartUI();

              // Restore button
              btnEl.classList.remove('morphing');
              btnEl.style.width = '';
              btnEl.style.height = '';
              btnEl.style.opacity = '1';
              btnEl.innerHTML = origText;

              // Success flash
              gsap.fromTo(btnEl, { boxShadow: '0 0 20px rgba(77,158,213,0.5)' }, { boxShadow: '0 0 0px rgba(77,158,213,0)', duration: 0.8 });
            }
          });

          // Arc motion via y keyframes
          gsap.to(dot, {
            keyframes: [
              { y: -80, duration: 0.3, ease: 'power2.out' },
              { y: 0, duration: 0.3, ease: 'power2.in' }
            ]
          });
        }
      });
    }

    // ─── CART UI ───
    function updateCartUI() {
      const badge = document.getElementById('cart-badge');
      const totalItems = cart.reduce((sum, c) => sum + c.qty, 0);
      badge.textContent = totalItems;
      badge.style.opacity = totalItems > 0 ? '1' : '0';
      badge.style.transform = totalItems > 0 ? 'scale(1)' : 'scale(0)';

      const itemsContainer = document.getElementById('cart-items');
      const totalEl = document.getElementById('cart-total');
      const total = cart.reduce((sum, c) => sum + c.price * c.qty, 0);
      totalEl.textContent = 'Rs.' + total.toLocaleString();

      // Persist cart
      saveCart();

      if (cart.length === 0) {
        itemsContainer.innerHTML = '<p class="text-white/30 text-sm text-center py-10">Your cart is empty</p>';
        return;
      }

      itemsContainer.innerHTML = cart.map(item => `
        <div class="flex items-center gap-4 glass rounded-xl p-3">
          <div class="w-12 h-12 rounded-lg flex items-center justify-center overflow-hidden bg-white/[0.03]">
            <img src="${item.image}" alt="${item.name}" class="h-10 w-10 object-contain" onerror="this.src=''; this.style.display='none'; this.parentElement.innerHTML='<svg width=\\'20\\' height=\\'20\\' fill=\\'none\\' stroke=\\'rgba(255,255,255,0.2)\\' stroke-width=\\'1\\'><rect x=\\'2\\' y=\\'2\\' width=\\'16\\' height=\\'16\\' rx=\\'2\\'/></svg>';">
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm text-white font-light truncate">${item.name}</p>
            <p class="text-xs text-white/40">${item.volume} &times; ${item.qty}</p>
          </div>
          <div class="text-right">
            <p class="text-sm text-purex-blue font-heading">Rs.${(item.price * item.qty).toLocaleString()}</p>
            <button class="text-[10px] text-white/30 hover:text-red-400 transition mt-1" onclick="removeFromCart(${item.id})">Remove</button>
          </div>
        </div>
      `).join('');
    }

    function removeFromCart(id) {
      cart = cart.filter(c => c.id !== id);
      updateCartUI();
    }

    // ─── CART SIDEBAR TOGGLE ───
    document.getElementById('cart-icon').addEventListener('click', () => toggleCart(true));
    document.getElementById('close-cart').addEventListener('click', () => toggleCart(false));
    document.getElementById('cart-overlay').addEventListener('click', () => toggleCart(false));

    function toggleCart(open) {
      const sidebar = document.getElementById('cart-sidebar');
      const overlay = document.getElementById('cart-overlay');
      if (open) {
        sidebar.style.transform = 'translateX(0)';
        overlay.style.opacity = '1';
        overlay.style.pointerEvents = 'auto';
      } else {
        sidebar.style.transform = 'translateX(100%)';
        overlay.style.opacity = '0';
        overlay.style.pointerEvents = 'none';
      }
    }

    // ─── FILTERS ───
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderProducts();
      });
    });

    // ─── SEARCH ───
    document.getElementById('search-input').addEventListener('input', (e) => {
      currentSearch = e.target.value;
      renderProducts();
    });

    // ─── SORT ───
    document.getElementById('sort-select').addEventListener('change', (e) => {
      currentSort = e.target.value;
      renderProducts();
    });

    // ─── INIT ───
    loadCart();
    renderProducts();

    // WhatsApp pulse animation
    gsap.to('#wa-ping', { scale: 1.5, opacity: 0, duration: 1.5, repeat: -1, ease: 'power2.out' });
  </script>
</body>
</html>
