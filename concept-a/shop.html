<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — PUREX Household Essentials</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            purex: { blue: '#4d9ed5', dark: '#181818', light: '#f7f7f7' },
          },
          fontFamily: {
            heading: ['"Poppins"', 'sans-serif'],
            body: ['"Inter"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/lenis@1/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e17; color: #f7f7f7; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .glass { background: rgba(77, 158, 213, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
    .glass-strong { background: rgba(255,255,255,0.04); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); }
    .grain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }
    .text-gradient { background: linear-gradient(135deg, #4d9ed5, #7bb8e0, #4d9ed5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav-link { position: relative; }
    .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: #4d9ed5; transition: width 0.3s ease; }
    .nav-link:hover::after { width: 100%; }
    .product-card { transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.4s ease; }
    .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 60px rgba(77,158,213,0.1); }
    .atc-btn { position: relative; overflow: hidden; transition: all 0.3s ease; }
    .atc-btn .btn-text { transition: opacity 0.2s ease; }
    .atc-btn.morphing { border-radius: 50% !important; width: 44px !important; height: 44px !important; padding: 0 !important; min-width: unset !important; }
    .atc-btn.morphing .btn-text { opacity: 0; }
    .flying-dot { position: fixed; width: 44px; height: 44px; background: #4d9ed5; border-radius: 50%; z-index: 1000; pointer-events: none; display: flex; align-items: center; justify-content: center; }
    .cart-badge { transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .cart-badge.bounce { transform: scale(1.4); }
    .filter-btn { transition: all 0.3s ease; }
    .filter-btn.active { background: rgba(77,158,213,0.15); color: #4d9ed5; border-color: rgba(77,158,213,0.3); }
  </style>
</head>
<body>
  <div class="grain"></div>

  <!-- ─── NAVBAR ─── -->
  <nav class="fixed top-0 w-full z-50 glass-strong" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="../index.html" class="text-[11px] text-white/40 hover:text-white transition tracking-wider">&larr; All Concepts</a>
      </div>
      <a href="index.html" class="flex items-center gap-3 group">
        <svg width="36" height="36" viewBox="0 0 100 100" class="transition-transform duration-300 group-hover:scale-110">
          <path d="M25 20 L25 80 L40 80 L40 55 L55 55 L70 35 L70 20 L55 20 L55 35 L40 35 L40 20 Z" fill="#4d9ed5"/>
          <path d="M55 45 L55 55 L45 55 L65 80 L80 80 L60 55 L70 55 L70 45 Z" fill="#4d9ed5"/>
        </svg>
        <div class="flex items-baseline">
          <span class="font-heading text-base font-light tracking-[0.3em] text-white">PURE</span>
          <span class="font-heading text-xl font-light text-purex-blue">X</span>
        </div>
      </a>
      <div class="hidden md:flex items-center gap-8">
        <a href="index.html" class="nav-link text-sm font-light tracking-wider text-white/80 hover:text-white transition">Home</a>
        <a href="shop.html" class="nav-link text-sm font-light tracking-wider text-white hover:text-white transition" style="border-bottom: 1px solid #4d9ed5; padding-bottom: 2px;">Shop</a>
        <a href="admin.html" class="nav-link text-sm font-light tracking-wider text-white/80 hover:text-white transition">Dashboard</a>
      </div>
      <!-- Cart -->
      <button id="cart-icon" class="relative p-2 group">
        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" class="text-white/70 group-hover:text-purex-blue transition">
          <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17M17 17a2 2 0 100 4 2 2 0 000-4zM9 21a2 2 0 100-4 2 2 0 000 4z"/>
        </svg>
        <span id="cart-badge" class="cart-badge absolute -top-1 -right-1 w-5 h-5 bg-purex-blue text-white text-[10px] rounded-full flex items-center justify-center font-medium opacity-0 scale-0 transition-all">0</span>
      </button>
    </div>
  </nav>

  <!-- ─── SHOP HEADER ─── -->
  <section class="pt-28 pb-12 px-6">
    <div class="max-w-7xl mx-auto">
      <p class="font-heading text-sm tracking-[0.4em] text-purex-blue/80 uppercase mb-3">Product Catalog</p>
      <h1 class="font-heading text-4xl md:text-5xl font-extralight text-white">Household <span class="text-gradient">Essentials</span></h1>
      <p class="text-white/40 font-light mt-3 max-w-lg">Taizab, Neel, Sweep, Soaps, and Bleach — everything a Pakistani home needs.</p>

      <!-- Filters -->
      <div class="flex flex-wrap gap-3 mt-8">
        <button class="filter-btn glass text-sm px-5 py-2 rounded-full text-white/60 tracking-wider active" data-filter="all">All</button>
        <button class="filter-btn glass text-sm px-5 py-2 rounded-full text-white/60 tracking-wider" data-filter="cleaning">Cleaning</button>
        <button class="filter-btn glass text-sm px-5 py-2 rounded-full text-white/60 tracking-wider" data-filter="soap">Soap</button>
        <button class="filter-btn glass text-sm px-5 py-2 rounded-full text-white/60 tracking-wider" data-filter="whitener">Whitener</button>
      </div>
    </div>
  </section>

  <!-- ─── PRODUCT GRID ─── -->
  <section class="px-6 pb-32">
    <div id="product-grid" class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    </div>
  </section>

  <!-- ─── CART SIDEBAR ─── -->
  <div id="cart-overlay" class="fixed inset-0 bg-black/60 z-[60] opacity-0 pointer-events-none transition-opacity duration-300"></div>
  <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full max-w-md z-[70] transform translate-x-full transition-transform duration-500 ease-out">
    <div class="h-full glass-strong border-l border-white/10 flex flex-col" style="background: rgba(10,14,23,0.95);">
      <div class="flex items-center justify-between p-6 border-b border-white/5">
        <h3 class="font-heading text-lg font-light text-white">Your Cart</h3>
        <button id="close-cart" class="text-white/40 hover:text-white transition">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4l12 12M16 4L4 16"/></svg>
        </button>
      </div>
      <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4">
        <p class="text-white/30 text-sm text-center py-10">Your cart is empty</p>
      </div>
      <div class="p-6 border-t border-white/5">
        <div class="flex justify-between mb-4">
          <span class="text-white/60 text-sm">Total</span>
          <span id="cart-total" class="text-purex-blue font-heading text-lg">Rs.0</span>
        </div>
        <button class="w-full bg-purex-blue text-white py-3 rounded-full text-sm tracking-wider hover:bg-purex-blue/80 transition">Checkout</button>
      </div>
    </div>
  </div>

  <!-- ─── FOOTER ─── -->
  <footer class="border-t border-white/5 py-12 px-6">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
      <div class="flex items-center gap-3">
        <svg width="28" height="28" viewBox="0 0 100 100">
          <path d="M25 20 L25 80 L40 80 L40 55 L55 55 L70 35 L70 20 L55 20 L55 35 L40 35 L40 20 Z" fill="#4d9ed5"/>
          <path d="M55 45 L55 55 L45 55 L65 80 L80 80 L60 55 L70 55 L70 45 Z" fill="#4d9ed5"/>
        </svg>
        <span class="text-xs tracking-[0.2em] text-white/30">PUREX CHEMICALS</span>
      </div>
      <p class="text-xs text-white/20">&copy; 2026 Purex Chemicals. All rights reserved.</p>
    </div>
  </footer>

  <script>
    // ─── LENIS ───
    const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)) });
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);

    // ─── PRODUCT DATA ───
    const products = [
      { id: 1, name: 'Taizab Cleaning Acid', category: 'cleaning', price: 120, purity: 'Extra Strong', cas: 'TZB-500', volume: '500ml', color: '#e74c3c' },
      { id: 2, name: 'Taizab Cleaning Acid', category: 'cleaning', price: 200, purity: 'Extra Strong', cas: 'TZB-1000', volume: '1 Litre', color: '#e74c3c' },
      { id: 3, name: 'Taizab Lemon Acid', category: 'cleaning', price: 140, purity: 'Lemon Fresh', cas: 'TZB-L500', volume: '500ml', color: '#f39c12' },
      { id: 4, name: 'Sweep Floor Cleaner', category: 'cleaning', price: 150, purity: 'Pine Fresh', cas: 'SWP-F500', volume: '500ml', color: '#27ae60' },
      { id: 5, name: 'Sweep Floor Cleaner', category: 'cleaning', price: 270, purity: 'Pine Fresh', cas: 'SWP-F1000', volume: '1 Litre', color: '#27ae60' },
      { id: 6, name: 'Sweep Toilet Cleaner', category: 'cleaning', price: 160, purity: 'Max Power', cas: 'SWP-T500', volume: '500ml', color: '#2980b9' },
      { id: 7, name: 'Purex Bleach', category: 'cleaning', price: 90, purity: 'Active Chlorine', cas: 'BLC-500', volume: '500ml', color: '#3498db' },
      { id: 8, name: 'Purex Bleach', category: 'cleaning', price: 160, purity: 'Active Chlorine', cas: 'BLC-1000', volume: '1 Litre', color: '#3498db' },
      { id: 9, name: 'Purex Clothes Soap Bar', category: 'soap', price: 35, purity: 'Deep Clean', cas: 'CS-130', volume: '130g Bar', color: '#4d9ed5' },
      { id: 10, name: 'Purex Clothes Soap Bar', category: 'soap', price: 55, purity: 'Deep Clean', cas: 'CS-230', volume: '230g Bar', color: '#4d9ed5' },
      { id: 11, name: 'Purex Clothes Soap 4-Pack', category: 'soap', price: 200, purity: 'Family Pack', cas: 'CS-4PK', volume: '4 x 130g', color: '#2c3e50' },
      { id: 12, name: 'Purex Bath Soap Rose', category: 'soap', price: 60, purity: 'Rose Fragrance', cas: 'BS-R100', volume: '100g Bar', color: '#e91e63' },
      { id: 13, name: 'Purex Bath Soap Neem', category: 'soap', price: 55, purity: 'Antibacterial', cas: 'BS-N100', volume: '100g Bar', color: '#4caf50' },
      { id: 14, name: 'Purex Bath Soap 3-Pack', category: 'soap', price: 160, purity: 'Value Pack', cas: 'BS-3PK', volume: '3 x 100g', color: '#9c27b0' },
      { id: 15, name: 'Purex Dish Soap Bar', category: 'soap', price: 45, purity: 'Grease Cutter', cas: 'DS-200', volume: '200g Bar', color: '#ff9800' },
      { id: 16, name: 'Purex Dish Soap Liquid', category: 'soap', price: 130, purity: 'Lemon Power', cas: 'DS-L500', volume: '500ml', color: '#f1c40f' },
      { id: 17, name: 'Purex Dish Soap Liquid', category: 'soap', price: 230, purity: 'Lemon Power', cas: 'DS-L1000', volume: '1 Litre', color: '#f1c40f' },
      { id: 18, name: 'Purex Neel Liquid', category: 'whitener', price: 30, purity: 'Ultra Blue', cas: 'NL-100', volume: '100ml', color: '#1a237e' },
      { id: 19, name: 'Purex Neel Liquid', category: 'whitener', price: 65, purity: 'Ultra Blue', cas: 'NL-250', volume: '250ml', color: '#1a237e' },
      { id: 20, name: 'Purex Neel Powder', category: 'whitener', price: 20, purity: 'Classic Blue', cas: 'NP-50', volume: '50g Sachet', color: '#283593' },
    ];

    let cart = [];

    // ─── RENDER PRODUCTS ───
    function renderProducts(filter = 'all') {
      const grid = document.getElementById('product-grid');
      const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
      grid.innerHTML = filtered.map(p => `
        <div class="product-card glass-strong rounded-2xl overflow-hidden group" data-category="${p.category}">
          <div class="relative h-48 flex items-center justify-center overflow-hidden" style="background: linear-gradient(135deg, rgba(${hexToRgb(p.color)},0.08), rgba(${hexToRgb(p.color)},0.02));">
            <svg width="80" height="100" viewBox="0 0 80 100" class="transition-transform duration-500 group-hover:scale-110">
              <rect x="20" y="0" width="40" height="8" rx="3" fill="${p.color}" opacity="0.4"/>
              <path d="M22 8 L22 35 L5 70 Q0 82 10 90 L70 90 Q80 82 75 70 L58 35 L58 8" fill="none" stroke="${p.color}" stroke-width="1.5" opacity="0.6"/>
              <path d="M10 70 Q15 60 40 65 Q65 70 70 70 L70 90 Q80 82 75 70 L58 35 L58 45 Q40 40 22 45 L22 35 L5 70 Q0 82 10 90 Z" fill="${p.color}" opacity="0.15"/>
            </svg>
            <span class="absolute top-3 right-3 text-[10px] tracking-widest uppercase px-2 py-1 rounded-full glass text-white/50">${p.category}</span>
          </div>
          <div class="p-5">
            <h3 class="font-heading text-sm font-light text-white mb-1">${p.name}</h3>
            <div class="flex items-center gap-3 mb-3">
              <span class="text-[10px] text-white/30 tracking-wider">SKU: ${p.cas}</span>
              <span class="text-[10px] text-white/30">|</span>
              <span class="text-[10px] text-purex-blue/80 tracking-wider">${p.purity}</span>
            </div>
            <div class="flex items-center justify-between">
              <div>
                <span class="text-lg font-heading font-light text-purex-blue">Rs.${p.price}</span>
                <span class="text-[10px] text-white/30 ml-1">/ ${p.volume}</span>
              </div>
              <button class="atc-btn bg-purex-blue/10 border border-purex-blue/20 text-purex-blue px-4 py-2 rounded-full text-xs tracking-wider hover:bg-purex-blue/20 transition-all flex items-center gap-2"
                      data-product-id="${p.id}" onclick="addToCart(${p.id}, this)">
                <span class="btn-text">Add to Cart</span>
                <svg class="btn-text" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 1v12M1 7h12"/></svg>
              </button>
            </div>
          </div>
        </div>
      `).join('');

      // Animate in
      gsap.from('.product-card', { opacity: 0, y: 30, duration: 0.5, stagger: 0.08, ease: 'power3.out' });
    }

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `${r},${g},${b}`;
    }

    // ─── ADD TO CART WITH FLY ANIMATION ───
    function addToCart(productId, btnEl) {
      const product = products.find(p => p.id === productId);
      if (!product) return;

      // Get positions
      const btnRect = btnEl.getBoundingClientRect();
      const cartEl = document.getElementById('cart-icon');
      const cartRect = cartEl.getBoundingClientRect();

      // Save original styles
      const origWidth = btnEl.offsetWidth;
      const origHeight = btnEl.offsetHeight;
      const origText = btnEl.innerHTML;

      // Phase 1: Morph button into a sphere
      btnEl.style.width = origWidth + 'px';
      btnEl.style.height = origHeight + 'px';
      btnEl.classList.add('morphing');

      gsap.to(btnEl, {
        width: 44, height: 44,
        duration: 0.25,
        ease: 'power2.in',
        onComplete: () => {
          // Phase 2: Create flying dot
          const dot = document.createElement('div');
          dot.className = 'flying-dot';
          dot.innerHTML = '<svg width="16" height="16" fill="none" stroke="white" stroke-width="2"><path d="M8 1v14M1 8h14"/></svg>';
          document.body.appendChild(dot);

          const newBtnRect = btnEl.getBoundingClientRect();
          gsap.set(dot, { left: newBtnRect.left, top: newBtnRect.top });

          // Hide original button temporarily
          btnEl.style.opacity = '0';

          // Fly to cart with arc
          gsap.to(dot, {
            left: cartRect.left + cartRect.width / 2 - 22,
            top: cartRect.top + cartRect.height / 2 - 22,
            scale: 0.3,
            duration: 0.6,
            ease: 'power3.in',
            motionPath: undefined,
            onComplete: () => {
              dot.remove();

              // Bounce the cart badge (Peak-End rule: memorable ending)
              const badge = document.getElementById('cart-badge');
              badge.classList.add('bounce');
              setTimeout(() => badge.classList.remove('bounce'), 300);

              // Update cart
              const existing = cart.find(c => c.id === productId);
              if (existing) existing.qty++;
              else cart.push({ ...product, qty: 1 });
              updateCartUI();

              // Restore button
              btnEl.classList.remove('morphing');
              btnEl.style.width = '';
              btnEl.style.height = '';
              btnEl.style.opacity = '1';
              btnEl.innerHTML = origText;

              // Success flash
              gsap.fromTo(btnEl, { boxShadow: '0 0 20px rgba(77,158,213,0.5)' }, { boxShadow: '0 0 0px rgba(77,158,213,0)', duration: 0.8 });
            }
          });

          // Arc motion via y keyframes
          gsap.to(dot, {
            keyframes: [
              { y: -80, duration: 0.3, ease: 'power2.out' },
              { y: 0, duration: 0.3, ease: 'power2.in' }
            ]
          });
        }
      });
    }

    // ─── CART UI ───
    function updateCartUI() {
      const badge = document.getElementById('cart-badge');
      const totalItems = cart.reduce((sum, c) => sum + c.qty, 0);
      badge.textContent = totalItems;
      badge.style.opacity = totalItems > 0 ? '1' : '0';
      badge.style.transform = totalItems > 0 ? 'scale(1)' : 'scale(0)';

      const itemsContainer = document.getElementById('cart-items');
      const totalEl = document.getElementById('cart-total');
      const total = cart.reduce((sum, c) => sum + c.price * c.qty, 0);
      totalEl.textContent = 'Rs.' + total.toLocaleString();

      if (cart.length === 0) {
        itemsContainer.innerHTML = '<p class="text-white/30 text-sm text-center py-10">Your cart is empty</p>';
        return;
      }

      itemsContainer.innerHTML = cart.map(item => `
        <div class="flex items-center gap-4 glass rounded-xl p-3">
          <div class="w-12 h-12 rounded-lg flex items-center justify-center" style="background: rgba(${hexToRgb(item.color)},0.1);">
            <svg width="20" height="26" viewBox="0 0 80 100"><rect x="20" y="0" width="40" height="8" rx="3" fill="${item.color}" opacity="0.5"/><path d="M22 8 L22 35 L5 70 Q0 82 10 90 L70 90 Q80 82 75 70 L58 35 L58 8" fill="none" stroke="${item.color}" stroke-width="2" opacity="0.4"/></svg>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm text-white font-light truncate">${item.name}</p>
            <p class="text-xs text-white/40">${item.volume} &times; ${item.qty}</p>
          </div>
          <div class="text-right">
            <p class="text-sm text-purex-blue font-heading">Rs.${(item.price * item.qty).toLocaleString()}</p>
            <button class="text-[10px] text-white/30 hover:text-red-400 transition mt-1" onclick="removeFromCart(${item.id})">Remove</button>
          </div>
        </div>
      `).join('');
    }

    function removeFromCart(id) {
      cart = cart.filter(c => c.id !== id);
      updateCartUI();
    }

    // ─── CART SIDEBAR TOGGLE ───
    document.getElementById('cart-icon').addEventListener('click', () => toggleCart(true));
    document.getElementById('close-cart').addEventListener('click', () => toggleCart(false));
    document.getElementById('cart-overlay').addEventListener('click', () => toggleCart(false));

    function toggleCart(open) {
      const sidebar = document.getElementById('cart-sidebar');
      const overlay = document.getElementById('cart-overlay');
      if (open) {
        sidebar.style.transform = 'translateX(0)';
        overlay.style.opacity = '1';
        overlay.style.pointerEvents = 'auto';
      } else {
        sidebar.style.transform = 'translateX(100%)';
        overlay.style.opacity = '0';
        overlay.style.pointerEvents = 'none';
      }
    }

    // ─── FILTERS ───
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProducts(btn.dataset.filter);
      });
    });

    // ─── INIT ───
    renderProducts();
  </script>
</body>
</html>
